<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Huddledin — Collaborative Care Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --teal:#0d9488;--teal-l:#2dd4bf;--teal-d:#0f766e;
  --mint:#a7f3d0;--mint-l:#d1fae5;--mint-ll:#ecfdf5;
  --lav:#c4b5fd;--lav-l:#ede9fe;--lav-d:#7c3aed;
  --coral:#fb923c;--coral-l:#ffedd5;
  --rose:#fb7185;--rose-l:#ffe4e6;
  --amber:#fbbf24;--amber-l:#fef3c7;
  --sky:#38bdf8;--sky-l:#e0f2fe;
  --navy:#1e293b;--slate:#64748b;--slate-l:#94a3b8;
  --bg:#f0fdf9;--white:#ffffff;
  --border:#c7f7e5;
  --s1:0 4px 20px rgba(13,148,136,.10),0 1px 4px rgba(13,148,136,.06);
  --s2:0 8px 32px rgba(13,148,136,.16),0 2px 8px rgba(13,148,136,.08);
  --s3:0 16px 48px rgba(13,148,136,.20),0 4px 16px rgba(13,148,136,.10);
  --r:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--navy);font-size:15px;-webkit-font-smoothing:antialiased}
.ff{font-family:'Fraunces',serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--mint);border-radius:10px}

@keyframes popIn{0%{opacity:0;transform:scale(.82) translateY(20px)}65%{transform:scale(1.04) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes badgePop{0%{transform:scale(0)}60%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}55%{transform:scale(1.12)}75%{transform:scale(.96)}100%{opacity:1;transform:scale(1)}}

.pop-in{animation:popIn .42s cubic-bezier(.34,1.56,.64,1) both}
.slide-up{animation:slideUp .35s ease both}
.fade-in{animation:fadeIn .28s ease both}
.bounce-in{animation:bounceIn .48s cubic-bezier(.34,1.56,.64,1) both}

/* ── LAYOUT ── */
#app-shell{display:flex;flex-direction:column;min-height:100vh}
#header{
  position:sticky;top:0;z-index:200;
  background:rgba(255,255,255,.9);backdrop-filter:blur(20px);
  border-bottom:2px solid var(--mint-l);
  height:66px;display:flex;align-items:center;padding:0 22px;gap:12px;
  box-shadow:0 4px 24px rgba(13,148,136,.07)
}
#logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo-bubble{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--teal),var(--teal-l));display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 12px rgba(13,148,136,.32)}
.logo-name{font-family:'Fraunces',serif;font-size:1.28rem;font-weight:800;color:var(--teal)}

/* Child switcher */
#child-switcher{display:flex;gap:7px;margin-left:8px}
.child-pill{
  display:flex;align-items:center;gap:7px;padding:6px 13px;
  border-radius:20px;border:2.5px solid transparent;
  background:var(--mint-ll);cursor:pointer;transition:all .22s;
  font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;color:var(--slate)
}
.child-pill:hover{background:var(--mint-l);transform:translateY(-1px)}
.child-pill.active{border-color:var(--teal);background:var(--mint-l);color:var(--teal-d);box-shadow:0 4px 14px rgba(13,148,136,.2)}
.child-avatar-img{width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid white}
.child-avatar-emoji{font-size:1.1rem}

#header-right{margin-left:auto;display:flex;align-items:center;gap:9px}

/* Body */
#body{display:flex;flex:1}
#sidenav{
  width:218px;min-width:218px;background:var(--white);
  border-right:2px solid var(--mint-l);
  display:flex;flex-direction:column;padding:18px 11px;gap:3px;overflow-y:auto
}
.sidenav-profile{margin-bottom:14px;padding:13px 14px 15px;border-radius:var(--r);background:var(--mint-ll);border:2px solid var(--mint-l)}
.sp-label{font-size:.67rem;color:var(--slate);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.sp-name{font-weight:800;color:var(--navy);font-size:.88rem;margin:3px 0 6px}
.nav-btn{
  display:flex;align-items:center;gap:10px;padding:10px 13px;
  border-radius:16px;border:none;background:transparent;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:600;font-size:.86rem;
  color:var(--slate);text-align:left;transition:all .18s;width:100%
}
.nav-btn:hover{background:var(--mint-ll);color:var(--navy);transform:translateX(2px)}
.nav-btn.active{background:linear-gradient(135deg,var(--mint-l),var(--lav-l));color:var(--teal-d);font-weight:800;box-shadow:0 4px 14px rgba(13,148,136,.14)}
.nav-btn .ni{font-size:1.1rem;width:20px;text-align:center}

#main{flex:1;overflow-y:auto;padding-bottom:24px}

#bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.94);backdrop-filter:blur(16px);
  border-top:2px solid var(--mint-l);box-shadow:0 -8px 32px rgba(13,148,136,.08);z-index:150
}
.bnav-btn{flex:1;padding:9px 2px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--slate-l);font-family:'Nunito',sans-serif;font-size:.58rem;font-weight:700;transition:all .2s}
.bnav-btn.active{color:var(--teal)}
.bnav-btn .bi{font-size:1.22rem;transition:transform .2s}
.bnav-btn.active .bi{transform:scale(1.18)}
.bnav-dot{width:4px;height:4px;border-radius:50%;background:var(--teal);margin-top:2px;animation:badgePop .3s ease}

/* Cards */
.card{background:var(--white);border-radius:var(--r);border:2px solid var(--mint-l);box-shadow:var(--s1);padding:20px;transition:all .22s}
.card.hov:hover{box-shadow:var(--s2);transform:translateY(-2px)}
.card.click{cursor:pointer}
.card.click:hover{box-shadow:var(--s2);transform:translateY(-3px)}
.card.sel{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.15)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:16px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0) scale(.97)}
.btn:disabled{opacity:.52;cursor:not-allowed;transform:none}
.btn-sm{padding:7px 14px;font-size:.78rem}
.btn-md{padding:11px 20px;font-size:.86rem}
.btn-lg{padding:13px 28px;font-size:.95rem}
.btn-xl{padding:16px 34px;font-size:1rem}
.btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal-l));color:#fff;box-shadow:0 4px 16px rgba(13,148,136,.32)}
.btn-primary:hover{box-shadow:0 6px 22px rgba(13,148,136,.42)}
.btn-secondary{background:var(--mint-l);color:var(--teal-d)}
.btn-lav{background:var(--lav-l);color:var(--lav-d)}
.btn-ghost{background:transparent;color:var(--teal);border:2.5px solid var(--teal-l)}
.btn-ghost:hover{background:var(--mint-l)}
.btn-danger{background:var(--rose-l);color:#be123c}
.btn-amber{background:var(--amber-l);color:#92400e}
.btn-white{background:#fff;color:var(--teal-d);box-shadow:0 4px 18px rgba(0,0,0,.13)}
.btn-full{width:100%;justify-content:center}
.btn-slate{background:#f1f5f9;color:var(--slate)}

/* Badges */
.badge{border-radius:20px;padding:3px 11px;font-size:.7rem;font-weight:800;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.badge-teal{background:var(--mint-l);color:var(--teal-d)}
.badge-coral{background:var(--coral-l);color:#c2410c}
.badge-amber{background:var(--amber-l);color:#92400e}
.badge-slate{background:#f1f5f9;color:var(--slate)}
.badge-lav{background:var(--lav-l);color:var(--lav-d)}
.badge-rose{background:var(--rose-l);color:#be123c}
.badge-green{background:#dcfce7;color:#166534}
.badge-sky{background:var(--sky-l);color:#0369a1}
.badge-navy{background:#e2e8f0;color:var(--navy)}

/* Inputs */
.inp{width:100%;padding:12px 16px;border-radius:16px;border:2.5px solid var(--mint-l);font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;outline:none;background:var(--white);color:var(--navy);transition:all .2s}
.inp:focus{border-color:var(--teal);box-shadow:0 0 0 4px rgba(13,148,136,.1)}
.inp::placeholder{color:var(--slate-l);font-weight:500}
textarea.inp{resize:vertical;min-height:110px;line-height:1.65}
select.inp{cursor:pointer}
.inp-group{display:flex;flex-direction:column;gap:11px}
.inp-label{font-size:.74rem;font-weight:800;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.44);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:26px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2);border:2px solid var(--mint-l);animation:popIn .42s cubic-bezier(.34,1.56,.64,1) both}
.modal-hd{padding:20px 26px 16px;border-bottom:2px solid var(--mint-ll);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:26px 26px 0 0}
.modal-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:800;color:var(--navy)}
.modal-x{background:var(--mint-ll);border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;font-size:.95rem;display:flex;align-items:center;justify-content:center;color:var(--slate);transition:all .2s}
.modal-x:hover{background:var(--rose-l);color:#be123c;transform:rotate(90deg)}
.modal-body{padding:22px 26px}

/* Toggle */
.toggle{width:44px;height:25px;border-radius:13px;background:var(--slate-l);cursor:pointer;position:relative;transition:background .22s;border:none;flex-shrink:0}
.toggle.on{background:linear-gradient(135deg,var(--teal),var(--teal-l))}
.toggle::after{content:'';width:19px;height:19px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .22s;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.toggle.on::after{left:22px}

/* Checkbox */
.chk{width:23px;height:23px;border-radius:7px;border:2.5px solid var(--mint);background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.7rem;font-weight:900;color:#fff}
.chk.done{background:linear-gradient(135deg,var(--teal),var(--teal-l));border-color:var(--teal);box-shadow:0 4px 12px rgba(13,148,136,.32)}

/* Blur/Lock */
.blur-wrap{position:relative;border-radius:var(--r);overflow:hidden}
.blur-content{filter:blur(4px);pointer-events:none;user-select:none}
.blur-lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:2;background:rgba(255,255,255,.22);backdrop-filter:blur(2px);border-radius:var(--r)}

/* Notif bell */
.notif-wrap{position:relative}
.notif-btn{background:var(--mint-ll);border:2px solid var(--mint-l);border-radius:14px;padding:8px 12px;cursor:pointer;font-size:1.05rem;position:relative;display:flex;align-items:center;transition:all .2s}
.notif-btn:hover{background:var(--mint-l);transform:scale(1.06)}
.notif-count{position:absolute;top:-7px;right:-7px;background:linear-gradient(135deg,var(--coral),var(--rose));color:#fff;border-radius:50%;min-width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;animation:badgePop .4s cubic-bezier(.34,1.56,.64,1);border:2.5px solid #fff}
.notif-dropdown{position:absolute;right:0;top:calc(100% + 9px);background:#fff;border-radius:20px;border:2px solid var(--mint-l);box-shadow:var(--s3);width:305px;z-index:500;overflow:hidden;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.notif-dd-hd{padding:14px 18px 12px;border-bottom:2px solid var(--mint-ll);display:flex;justify-content:space-between;align-items:center}
.notif-item{padding:12px 18px;border-bottom:1px solid var(--mint-ll);display:flex;gap:11px;align-items:flex-start;transition:background .14s;cursor:pointer}
.notif-item:hover{background:var(--mint-ll)}
.notif-item.unread{background:var(--mint-l)}

/* Spinner */
.spinner{width:18px;height:18px;border:2.5px solid var(--mint);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}

/* Section */
.section{padding:26px;max-width:970px;margin:0 auto;animation:fadeIn .28s ease}
.page-title{font-family:'Fraunces',serif;font-size:1.65rem;font-weight:800;color:var(--navy);margin-bottom:4px}
.page-sub{color:var(--slate);font-size:.83rem;margin-bottom:22px;font-weight:500}
.sec-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.sec-hd-left{flex:1}
.sec-hd-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* Grids */
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:18px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:15px}
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:14px}
.stack{display:flex;flex-direction:column;gap:11px}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.1);flex-shrink:0;overflow:hidden}

/* File item */
.file-item{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:14px;background:var(--mint-ll);border:2px solid var(--mint-l);transition:all .2s;cursor:pointer}
.file-item:hover{background:var(--mint-l);transform:translateX(3px)}

/* Chat bubbles */
.bubble-me{background:linear-gradient(135deg,var(--teal),var(--teal-l));color:#fff;border-radius:20px 20px 5px 20px;padding:10px 16px;max-width:70%;font-size:.86rem;line-height:1.55}
.bubble-them{background:var(--white);color:var(--navy);border-radius:20px 20px 20px 5px;border:2px solid var(--mint-l);padding:10px 16px;max-width:70%;font-size:.86rem;line-height:1.55}
.bubble-time{font-size:.65rem;opacity:.62;margin-top:4px;text-align:right}
.bubble-name{font-size:.68rem;font-weight:800;color:var(--teal);margin-bottom:3px}

/* Calendar */
.cal-hd{background:linear-gradient(135deg,var(--teal),var(--teal-l));color:#fff;padding:18px 22px;border-radius:20px 20px 0 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:14px}
.cal-dl{text-align:center;font-size:.7rem;font-weight:800;color:var(--slate);padding:6px 0}
.cal-day{min-height:36px;padding:2px;text-align:center}
.cal-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:.8rem;font-weight:600}
.cal-num.today{background:var(--lav-l);color:var(--lav-d);font-weight:900}
.cal-num.has-event{background:linear-gradient(135deg,var(--teal),var(--teal-l));color:#fff;font-weight:900;cursor:pointer;box-shadow:0 3px 9px rgba(13,148,136,.28)}
.cal-num.has-event:hover{transform:scale(1.14)}
.cal-dot{font-size:.48rem;background:var(--teal);color:#fff;border-radius:3px;padding:1px 3px;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* AI block */
.ai-block{background:linear-gradient(135deg,var(--mint-l),var(--lav-l));border-radius:18px;padding:18px;border:2.5px solid var(--teal-l);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.ai-label{font-size:.7rem;font-weight:900;color:var(--teal);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px}

/* Stat cards */
.stat-card{display:flex;align-items:center;gap:15px}
.stat-icon{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;flex-shrink:0}
.stat-val{font-size:1.9rem;font-weight:900;color:var(--navy);line-height:1}
.stat-lbl{font-size:.72rem;color:var(--slate);margin-top:3px;font-weight:600}

/* Ghost card */
.ghost-card{opacity:.65;border-style:dashed !important;border-color:var(--slate-l) !important}

/* Toast */
.toast-wrap{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:#fff;border:2.5px solid var(--teal);border-radius:18px;padding:12px 24px;font-weight:800;color:var(--teal-d);white-space:nowrap;box-shadow:var(--s3);animation:bounceIn .45s cubic-bezier(.34,1.56,.64,1);pointer-events:auto}
.toast.error{border-color:var(--rose);color:#be123c}
.toast.info{border-color:var(--lav);color:var(--lav-d)}

/* Auth */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;background:linear-gradient(145deg,#0f766e 0%,#14b8a6 42%,#7dd3fc 75%,#c4b5fd 100%)}
.auth-orb{position:absolute;border-radius:50%;pointer-events:none}
.auth-card{background:#fff;border-radius:28px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.22);position:relative;z-index:1;border:2px solid var(--mint-l);overflow:hidden;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both}
.auth-hero{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-l) 50%,#7dd3fc 100%);padding:34px 34px 26px;text-align:center;position:relative;overflow:hidden}
.auth-hero::before{content:'';position:absolute;top:-28px;right:-28px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.12)}
.auth-hero::after{content:'';position:absolute;bottom:-18px;left:-18px;width:75px;height:75px;border-radius:50%;background:rgba(255,255,255,.08)}
.auth-logo-wrap{width:68px;height:68px;border-radius:20px;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin:0 auto 13px;box-shadow:0 8px 22px rgba(0,0,0,.14)}
.auth-title{font-family:'Fraunces',serif;font-size:2.1rem;font-weight:800;color:#fff;margin-bottom:5px}
.auth-sub{color:rgba(255,255,255,.8);font-size:.88rem;font-weight:500;line-height:1.5}
.auth-body{padding:30px}
.auth-tab-row{display:flex;background:var(--mint-ll);border-radius:14px;padding:4px;margin-bottom:22px}
.auth-tab{flex:1;padding:9px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-weight:700;font-size:.86rem;cursor:pointer;transition:all .2s;color:var(--slate);background:transparent}
.auth-tab.active{background:#fff;color:var(--teal-d);box-shadow:0 4px 12px rgba(13,148,136,.18)}
.role-pick{display:flex;gap:10px;margin-bottom:16px}
.role-opt{flex:1;padding:13px 10px;border-radius:18px;border:2.5px solid var(--mint-l);background:var(--mint-ll);cursor:pointer;transition:all .2s;text-align:center;font-family:'Nunito',sans-serif}
.role-opt:hover{border-color:var(--teal-l);transform:translateY(-2px)}
.role-opt.sel{border-color:var(--teal);background:var(--mint-l);box-shadow:0 6px 18px rgba(13,148,136,.2)}
.role-opt .re{font-size:1.7rem;margin-bottom:4px}
.role-opt .rl{font-size:.76rem;font-weight:800;color:var(--navy)}
.auth-error{background:var(--rose-l);border:2px solid var(--rose);border-radius:12px;padding:10px 15px;color:#be123c;font-size:.82rem;font-weight:700;margin-bottom:11px}
.auth-hint{text-align:center;color:var(--slate);font-size:.76rem;margin-top:11px;font-weight:600}
.auth-link{color:var(--teal);cursor:pointer;text-decoration:underline;text-underline-offset:2px}

/* Vault unsaved warning */
.unsaved-banner{background:var(--amber-l);border:2px solid var(--amber);border-radius:14px;padding:11px 18px;color:#92400e;font-weight:700;font-size:.84rem;display:flex;align-items:center;gap:10px;margin-bottom:14px}

/* Draft badge */

function doLogin(email,password,role,name=''){
  const users=DB.users;

  if(!user){
    user={email,password,role,name:name||email.split('@')[0],specialistId:role==='specialist'?'s1':null};

  } else if(user.password!==password){return{error:'Incorrect password.'};}
  session={email,role,name:user.name,specialistId:user.specialistId};
  LS.set('session',session);
  return{ok:true};
}

function el(tag,attrs={},kids=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='class')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for(const k of kids){if(k==null)continue;e.appendChild(typeof k==='string'?document.createTextNode(k):k);}
  return e;
}
const d=(cls,kids=[],s={})=>el('div',{class:cls,style:s},kids);
const p=(t,s={})=>el('p',{style:{color:'var(--slate)',lineHeight:'1.65',fontSize:'.86rem',fontWeight:500,...s}},[t]);
function mkBtn(label,cls,onClick,attrs={}){
  const b=el('button',{class:'btn '+cls,...attrs});
  if(typeof label==='string')b.innerHTML=label;else b.appendChild(label);
  b.addEventListener('click',onClick);return b;
}
function badge(t,c='teal'){return el('span',{class:`badge badge-${c}`},[t]);}
function mkAvatar(emoji,sz=40,bg='#d1fae5'){
  return el('div',{class:'avatar',style:{width:sz+'px',height:sz+'px',background:bg,fontSize:(sz*.42)+'px'}},[emoji]);
}
function spinner(){return el('span',{class:'spinner'});}

function toast(msg,type='success',ms=3200){
  const w=document.getElementById('toast-wrap');
  if(!w)return;
  const t=el('div',{class:'toast'+(type==='error'?' error':type==='info'?' info':'')},[msg]);
  w.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},ms);
}

function openModal(title,buildFn,maxW=490){
  const ov=el('div',{class:'overlay'});
  const mo=el('div',{class:'modal',style:{maxWidth:maxW+'px'}});
  const mh=el('div',{class:'modal-hd'},[
    el('span',{class:'modal-title'},[title]),
    el('button',{class:'modal-x',html:'✕'})
  ]);
  mh.querySelector('.modal-x').onclick=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  const mb=el('div',{class:'modal-body'});
  buildFn(mb,()=>ov.remove());
  mo.appendChild(mh);mo.appendChild(mb);ov.appendChild(mo);
  document.body.appendChild(ov);
  return ()=>ov.remove();
}
function openConfirm(title,msg,danger,onOk){
  openModal(title,(mb,close)=>{
    mb.appendChild(p(msg,{marginBottom:'20px'}));
    const row=d('',[], {display:'flex',gap:'11px',justifyContent:'flex-end'});
    row.appendChild(mkBtn('Cancel','btn-md btn-ghost',close));
    row.appendChild(mkBtn('Confirm','btn-md '+(danger?'btn-danger':'btn-primary'),()=>{onOk();close();}));
    mb.appendChild(row);
  },380);
}

   {bottom:'-60px',left:'-60px',w:'170px',bg:'rgba(255,255,255,.07)'},

  hero.appendChild(el('p',{class:'auth-sub'},['Collaborative care for children with special needs']));
  card.appendChild(hero);

  const body=el('div',{class:'auth-body'});
  let mode='signin',selRole='parent';

  const tabRow=el('div',{class:'auth-tab-row'});
  const t1=el('button',{class:'auth-tab active'},['Sign In']);
  const t2=el('button',{class:'auth-tab'},['Create Account']);
  const setMode=m=>{mode=m;t1.className='auth-tab'+(m==='signin'?' active':'');t2.className='auth-tab'+(m==='signup'?' active':'');buildForm();};
  t1.onclick=()=>setMode('signin');t2.onclick=()=>setMode('signup');
  tabRow.appendChild(t1);tabRow.appendChild(t2);
  body.appendChild(tabRow);

  const formArea=el('div');body.appendChild(formArea);

  function buildForm(){
    formArea.innerHTML='';
    const rp=el('div',{class:'role-pick'});
    [{r:'parent',e:'👨‍👩‍👧',l:'Parent'},{r:'specialist',e:'🩺',l:'Specialist'}].forEach(({r,e,l})=>{
      const o=el('div',{class:'role-opt'+(selRole===r?' sel':'')});
      o.innerHTML=`<div class="re">${e}</div><div class="rl">${l}</div>`;
      o.onclick=()=>{selRole=r;buildForm();};
      rp.appendChild(o);
    });
    formArea.appendChild(rp);

    const errBox=el('div');formArea.appendChild(errBox);
    const ig=el('div',{class:'inp-group'});

    if(mode==='signup'){
      const ni=el('input',{class:'inp',placeholder:'Your full name',type:'text'});ni.id='auth-name';ig.appendChild(ni);
    }
    const ei=el('input',{class:'inp',placeholder:'Email address',type:'email'});ei.id='auth-email';
    const pi=el('input',{class:'inp',placeholder:'Password',type:'password'});pi.id='auth-pass';
    ig.appendChild(ei);ig.appendChild(pi);

    const sb=mkBtn(mode==='signin'?'Sign In ✨':'Create Account 🎉','btn-lg btn-primary btn-full',()=>{
      const email=ei.value.trim(),pass=pi.value.trim();
      const name=mode==='signup'?(formArea.querySelector('#auth-name')?.value.trim()||''):'';
      errBox.innerHTML='';
      if(!email||!pass){errBox.appendChild(el('div',{class:'auth-error'},['Please fill in all fields.']));return;}
      const res=doLogin(email,pass,selRole,name);
      if(res.error){errBox.appendChild(el('div',{class:'auth-error'},[res.error]));return;}
      S.activeTab=session.role==='parent'?'dashboard':'dashboard';
      S.activeChild='c1';re();
    });
    ig.appendChild(sb);
    formArea.appendChild(ig);
    formArea.appendChild(el('p',{class:'auth-hint'},[
      mode==='signin'?'No account? ':'Have an account? ',
      el('span',{class:'auth-link',onclick:()=>setMode(mode==='signin'?'signup':'signin')},
        [mode==='signin'?'Create one free':'Sign in instead'])
    ]));
    formArea.appendChild(el('p',{class:'auth-hint',style:{marginTop:'7px',color:'#94a3b8'}},

/* ── NOTIF BELL ── */
function renderNotifBell(){
  const notifs=DB.notifications;
  const unread=notifs.filter(n=>!n.read).length;
  const wrap=el('div',{class:'notif-wrap'});
  const btn2=el('button',{class:'notif-btn'},['🔔']);
  if(unread>0)btn2.appendChild(el('span',{class:'notif-count'},[String(unread)]));
  let dd=null;
  btn2.onclick=e=>{
    e.stopPropagation();
    if(dd){dd.remove();dd=null;return;}
    dd=el('div',{class:'notif-dropdown'});
    const dh=el('div',{class:'notif-dd-hd'},[
      el('span',{style:{fontWeight:800,color:'var(--navy)'}},['Notifications']),
      mkBtn('See all','btn-sm btn-lav',()=>{dd.remove();dd=null;S.activeTab='notifications';re();})
    ]);
    dd.appendChild(dh);
    (notifs.slice(0,6)).forEach(n=>{
      const ni=el('div',{class:'notif-item'+(n.read?'':" unread")});
      ni.innerHTML=`<span style="font-size:1.25rem">${notifIcon[n.type]||'📢'}</span><div><div style="font-size:.79rem;font-weight:700;color:var(--navy);line-height:1.4">${n.msg}</div><div style="font-size:.68rem;color:var(--slate-l);margin-top:2px">${n.time}</div></div>`;
      ni.onclick=()=>{
        const ns=DB.notifications,i=ns.findIndex(x=>x.id===n.id);
        if(i>-1){ns[i].read=true;DB.notifications=ns;}
        dd.remove();dd=null;S.activeTab='notifications';re();
      };
      dd.appendChild(ni);
    });
    wrap.appendChild(dd);
    const out=e2=>{if(!wrap.contains(e2.target)){dd?.remove();dd=null;document.removeEventListener('click',out);}};
    setTimeout(()=>document.addEventListener('click',out),10);
  };
  wrap.appendChild(btn2);return wrap;
}

function renderSidenav(){

  tabs.forEach(t=>{

function switchTab(id){
  // Guard unsaved vault changes
  if(S.activeTab==='vault'&&S.vaultHasUnsaved&&id!=='vault'){
    openConfirm('Unsaved Changes','You have unsaved notes in the Vault. Leave without saving?',true,()=>{S.vaultHasUnsaved=false;S.activeTab=id;re();});
    return;
  }
  S.activeTab=id;re();
}

/* ── BOTTOM NAV ── */
function renderBottomNav(){
  const tabs=getTabs().slice(0,6);
  const nav=el('nav',{id:'bottom-nav'});
  tabs.forEach(t=>{
    const b=el('button',{class:'bnav-btn'+(S.activeTab===t.id?' active':'')});
    b.innerHTML=`<span class="bi">${t.icon}</span>${t.label}`;

/* ── GLOBAL SEARCH OVERLAY ── */
function renderSearchOverlay(){
  const ov=el('div',{class:'search-overlay'});
  ov.onclick=e=>{if(e.target===ov){S.searchOpen=false;re();}};
  const box=el('div',{class:'search-box'});
  const si=el('input',{class:'search-inp',placeholder:'🔍 Search patients, notes, files...',type:'text'});
  si.value=S.searchQuery||'';
  box.appendChild(si);
  const results=el('div',{class:'search-results'});
  const doSearch=q=>{
    results.innerHTML='';
    if(!q.trim())return;
    // Search patients
    DB.children.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())).forEach(c=>{
      const item=el('div',{class:'search-result-item'});
      item.innerHTML=`<span style="font-size:1.5rem">${c.avatar}</span><div><div style="font-weight:700;color:var(--navy)">${c.name}</div><div style="font-size:.76rem;color:var(--slate)">Patient · Age ${c.age}</div></div>`;
      item.onclick=()=>{S.activeChild=c.id;S.activeTab='vault';S.searchOpen=false;S.searchQuery='';re();};
      results.appendChild(item);
    });
    // Search notes
    DB.vaultNotes.filter(n=>n.title.toLowerCase().includes(q.toLowerCase())||n.content.toLowerCase().includes(q.toLowerCase())).forEach(n=>{
      const c=DB.children.find(x=>x.id===n.childId);
      const item=el('div',{class:'search-result-item'});
      item.innerHTML=`<span style="font-size:1.5rem">📝</span><div><div style="font-weight:700;color:var(--navy)">${n.title}</div><div style="font-size:.76rem;color:var(--slate)">${c?.avatar} ${c?.name} · ${n.date}</div></div>`;
      item.onclick=()=>{S.activeChild=n.childId;S.activeTab='vault';S.activeVaultId=n.id;S.searchOpen=false;S.searchQuery='';re();};
      results.appendChild(item);
    });
    if(!results.children.length){
      results.appendChild(el('div',{style:{padding:'20px',color:'var(--slate)',textAlign:'center',fontWeight:600}},['No results found.']));
    }
  };
  si.oninput=e=>{S.searchQuery=e.target.value;doSearch(e.target.value);};
  doSearch(S.searchQuery||'');
  box.appendChild(results);ov.appendChild(box);
  setTimeout(()=>si.focus(),50);
  return ov;
}

═══════════════════════════════════════════════ */
function renderContent(){
  const t=S.activeTab,r=session?.role;
  if(t==='dashboard')return r==='parent'?renderParentDashboard():renderSpecDashboard();
  if(t==='files')return renderFiles();
  if(t==='team'&&r==='parent')return renderTeam();
  if(t==='calendar')return renderCalendar();
  if(t==='chat')return renderChat();
  if(t==='notifications')return renderNotifications();
  if(t==='settings')return renderSettings();
  if(t==='patients')return renderPatients();
  if(t==='vault')return renderVault();
  if(t==='homework')return r==='parent'?renderHomeworkParent():renderHomeworkSpec();
  if(t==='credentials')return renderCredentials();
  return d('section',[p('Coming soon…')]);
}

/* ═══════════════════════════════════════════════

function renderFiles(){
  const isParent=session?.role==='parent';
  const spec=DB.specialists.find(s=>s.id===session?.specialistId);
  const perms=spec?.permissions[S.activeChild]||[];
  const canAccess=key=>isParent||perms.includes(key);
  const folders=DB.folders;
  const child=DB.children.find(c=>c.id===S.activeChild);

  const sec=el('div',{class:'section'});
  const hd=el('div',{class:'sec-hd'});
  hd.appendChild(el('div',{class:'sec-hd-left'},[
    el('h2',{class:'page-title'},['File Manager']),
    el('p',{class:'page-sub'},[`${child?.avatar} ${child?.name} · Dropbox-backed · Granular sharing`])
  ]));
  if(isParent){
    const fi=el('input',{type:'file',style:{display:'none'}});fi.id='fileInput';
    fi.onchange=e=>{const f=e.target.files[0];if(f)showShareModal(f);};
    sec.appendChild(fi);
    hd.appendChild(el('div',{class:'sec-hd-right'},[mkBtn('📤 Upload File','btn-md btn-primary',()=>document.getElementById('fileInput')?.click())]));
  }
  sec.appendChild(hd);

  const grid=el('div',{class:'g4'});
  folders.forEach(folder=>{
    const acc=canAccess(folder.key);
    const wrap=el('div',{class:'blur-wrap'});
    const inner=el('div',{class:'card'+(acc?' click':''),style:{textAlign:'center',padding:'22px 14px'}});
    inner.innerHTML=`<div class="${acc?'':'blur-content'}"><div style="font-size:2.1rem;margin-bottom:8px">${folder.icon}</div><div style="font-weight:800;color:var(--navy);font-size:.84rem">${folder.name}</div><div style="font-size:.72rem;color:var(--slate);margin-top:4px">${folder.files.length} files</div></div>`;
    if(!acc){
      const lock=el('div',{class:'blur-lock'});
      lock.innerHTML='<span style="font-size:1.8rem">🔒</span><span style="font-size:.68rem;color:var(--slate);font-weight:800;margin-top:5px">Request Access</span>';
      lock.onclick=()=>showAccessRequest(folder);
      wrap.appendChild(inner);wrap.appendChild(lock);
    } else {
      inner.onclick=()=>showFolderModal(folder,isParent);
      wrap.appendChild(inner);
    }
    grid.appendChild(wrap);
  });
  sec.appendChild(grid);
  return sec;
}

function showShareModal(file){
  openModal('📤 Upload & Share',(mb,close)=>{
    mb.appendChild(el('p',{style:{color:'var(--slate)',marginBottom:'16px',fontWeight:600}},[`Who can view "${file.name}"?`]));
    const permsMap={};
    const rows=el('div',{class:'inp-group',style:{marginBottom:'18px'}});
    DB.specialists.filter(s=>s.status==='active').forEach(s=>{
      permsMap[s.id]=false;
      const lbl=el('label',{style:{display:'flex',alignItems:'center',gap:'11px',cursor:'pointer',padding:'10px 13px',borderRadius:'13px',background:'var(--mint-ll)',border:'2px solid var(--mint-l)'}});
      const cb=el('input',{type:'checkbox'});cb.checked=false;
      cb.onchange=e=>permsMap[s.id]=e.target.checked;
      lbl.appendChild(cb);lbl.appendChild(mkAvatar(s.avatar,32,'#d1fae5'));

      acts.appendChild(mkBtn('⚙️ Permissions','btn-sm btn-slate',()=>showPermModal(s)));

    archive.forEach(a=>{

      ac.appendChild(badge('Legacy','slate'));

function removeSpecialist(spec){
  const child=DB.children.find(c=>c.id===S.activeChild);
  // Create legacy archive entry
  const archive=DB.legacyArchive;
  const specNotes=DB.vaultNotes.filter(n=>n.specialistId===spec.id&&n.childId===S.activeChild);
  archive.push({specialistId:spec.id,specialistName:spec.name,childId:S.activeChild,childName:child?.name,archivedAt:new Date().toISOString().split('T')[0],notes:specNotes});
  DB.legacyArchive=archive;
  // Revoke permissions
  const specs=DB.specialists;
  const i=specs.findIndex(s=>s.id===spec.id);
  if(i>-1){specs[i].permissions[S.activeChild]=[];}
  DB.specialists=specs;
  re();toast('✅ '+spec.name+' removed. Their notes are in the Legacy Archive.');
}

      const apts=DB.appointments;
      const specId=session?.specialistId||null;
      apts.push({id:'a_'+Date.now(),childId:S.activeChild,title:ti.value,specialist:si.value||session?.name||'TBD',specialistId:specId,date:di.value,time:tmi.value||'TBD',type:typeSel.value,sharedWith});
      DB.appointments=apts;
      if(DB.notifPrefs.appointments)pushNotif('report',`New appointment added: ${ti.value} on ${di.value}`,S.activeChild);
      close();re();toast('✅ Appointment added!');
    }));
  },500);
}

/* ═══════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════ */
function renderChat(){
  const allChats=DB.chats;
  const role=session?.role;
  const specId=session?.specialistId;

  // Filter visible chats
  const visChats=allChats.filter(c=>{
    if(role==='parent')return c.participants.includes('parent');
    return c.participants.includes(specId||'s1');
  });

  const sec=el('div',{class:'section'});
  const hd=el('div',{class:'sec-hd'});
  hd.appendChild(el('h2',{class:'page-title'},['Messages']));
  hd.appendChild(el('div',{class:'sec-hd-right'},[
    role==='specialist'?mkBtn('🤝 Request Consult','btn-sm btn-lav',()=>showConsultModal()):el('span')
  ]));
  sec.appendChild(hd);

  const isMobile=window.innerWidth<768;
  const wrap=el('div',{style:{display:'grid',gridTemplateColumns:isMobile?'1fr':'200px 1fr',gap:'16px',height:isMobile?'auto':'470px'}});

  // Chat list
  const list=el('div',{class:'card',style:{padding:0,overflow:'hidden'}});
  visChats.forEach(chat=>{
    const isConsult=chat.type==='specialist-consult';
    const lastMsg=chat.messages[chat.messages.length-1];
    const otherSpecId=chat.participants.find(p=>p!=='parent'&&p!==(specId||'s1'));
    const otherSpec=DB.specialists.find(s=>s.id===otherSpecId);
    const chatName=chat.name||(isConsult?'Specialist Consult':(otherSpec?.name||'Chat'));
    const childName=DB.children.find(c=>c.id===chat.childId)?.name||'';

    const item=el('div',{style:{padding:'12px 15px',borderBottom:'2px solid var(--mint-ll)',cursor:'pointer',background:S.activeChatId===chat.id?'var(--mint-l)':'#fff',transition:'background .14s'}});
    item.innerHTML=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
      ${isConsult?'<span style="font-size:.7rem;background:var(--lav-l);color:var(--lav-d);border-radius:6px;padding:1px 7px;font-weight:800">Consult</span>':''}
      <span style="font-weight:800;font-size:.83rem;color:var(--navy)">${chatName}</span></div>
      <div style="font-size:.7rem;color:var(--slate)">${childName}</div>
      <div style="font-size:.68rem;color:var(--slate-l);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${lastMsg?.text?.slice(0,32)||''}${lastMsg?.text?.length>32?'...':''}</div>`;
    item.onclick=()=>{S.activeChatId=chat.id;re();};
    list.appendChild(item);
  });
  if(!visChats.length){
    list.appendChild(el('div',{style:{padding:'20px',color:'var(--slate)',fontSize:'.84rem',fontWeight:600}},['No chats yet.']));
  }
  wrap.appendChild(list);

  // Chat window
  const activeChat=allChats.find(c=>c.id===S.activeChatId);
  const win=el('div',{class:'card',style:{display:'flex',flexDirection:'column',padding:0,overflow:'hidden',minHeight:isMobile?'350px':'auto'}});

  if(activeChat){
    const isConsult=activeChat.type==='specialist-consult';
    const otherSpecId=activeChat.participants.find(p=>p!=='parent'&&p!==(specId||'s1'));
    const otherSpec=DB.specialists.find(s=>s.id===otherSpecId);

    const winHd=d('',[], {padding:'13px 17px',borderBottom:'2px solid var(--mint-ll)',display:'flex',gap:'12px',alignItems:'center'});
    winHd.appendChild(mkAvatar(isConsult?'🔗':'💬',36,'#d1fae5'));
    const wi=d('');
    wi.appendChild(el('div',{style:{fontWeight:800,fontSize:'.88rem',color:'var(--navy)'}},[activeChat.name||(otherSpec?.name||'Chat')]));
    wi.appendChild(el('div',{style:{fontSize:'.7rem',color:isConsult?'var(--lav-d)':'var(--teal)',fontWeight:700}},
      [isConsult?'🔗 Approved specialist consult':'🔒 Secure · Parent-approved']));
    winHd.appendChild(wi);
    win.appendChild(winHd);

    const msgArea=el('div',{id:'msg-area',style:{flex:1,overflowY:'auto',padding:'15px 17px',display:'flex',flexDirection:'column',gap:'11px'}});
    activeChat.messages.forEach(m=>{
      const myId=role==='parent'?'parent':(specId||'s1');
      const isMe=m.sender===myId;
      const senderSpec=DB.specialists.find(s=>s.id===m.sender);
      const row=d('',[], {display:'flex',justifyContent:isMe?'flex-end':'flex-start'});
      const bub=el('div',{class:isMe?'bubble-me':'bubble-them'});
      if(!isMe)bub.appendChild(el('div',{class:'bubble-name'},[senderSpec?.name||(m.sender==='parent'?'Parent':'Unknown')]));
      bub.appendChild(el('div',{},[m.text]));
      bub.appendChild(el('div',{class:'bubble-time'},[m.time]));
      row.appendChild(bub);msgArea.appendChild(row);
    });
    win.appendChild(msgArea);
    setTimeout(()=>{const ma=document.getElementById('msg-area');if(ma)ma.scrollTop=ma.scrollHeight;},60);

    const inputRow=d('',[], {padding:'12px 15px',borderTop:'2px solid var(--mint-ll)',display:'flex',gap:'9px'});
    const mi=el('input',{class:'inp',placeholder:'Type a message...',style:{flex:'1'}});
    mi.value=S.chatMsg||'';mi.oninput=e=>S.chatMsg=e.target.value;
    const sb2=mkBtn('Send 💬','btn-md btn-primary',()=>{
      const txt=mi.value.trim();if(!txt)return;
      const all=DB.chats,ci=all.findIndex(c=>c.id===activeChat.id);
      if(ci>-1){
        const senderKey=role==='parent'?'parent':(specId||'s1');
        all[ci].messages.push({id:'m_'+Date.now(),sender:senderKey,text:txt,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),date:new Date().toISOString().split('T')[0]});
        DB.chats=all;
      }
      S.chatMsg='';re();
      setTimeout(()=>{const ma=document.getElementById('msg-area');if(ma)ma.scrollTop=ma.scrollHeight;},60);
    });
    mi.onkeydown=e=>{if(e.key==='Enter')sb2.click();};
    inputRow.appendChild(mi);inputRow.appendChild(sb2);
    win.appendChild(inputRow);
  } else {
    win.appendChild(el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--slate)',fontWeight:600}},['Select a conversation to begin']));
  }
  wrap.appendChild(win);
  sec.appendChild(wrap);
  return sec;
}

/* ═══════════════════════════════════════════════
   VAULT (with draft + unsaved guard)
═══════════════════════════════════════════════ */
function renderVault(){
  const specId=session?.specialistId||'s1';
  const child=DB.children.find(c=>c.id===S.activeChild);
  const myNotes=DB.vaultNotes.filter(n=>n.specialistId===specId&&n.childId===S.activeChild);
  const activeNote=myNotes.find(n=>n.id===S.activeVaultId)||null;

  const sec=el('div',{class:'section'});
  const hd=el('div',{class:'sec-hd'});
  hd.appendChild(el('div',{class:'sec-hd-left'},[
    el('h2',{class:'page-title'},['Private Vault']),
    el('p',{class:'page-sub'},['🔒 Clinical notes — hidden until published · '+child?.avatar+' '+child?.name])
  ]));
  hd.appendChild(el('div',{class:'sec-hd-right'},[
    mkBtn('✏️ New Note','btn-md btn-primary',()=>{
      const nn={id:'v_'+Date.now(),specialistId:specId,childId:S.activeChild,date:new Date().toISOString().split('T')[0],title:'New Session Notes',content:'',published:false,locked:false,isDraft:true,summary:'',lastSaved:''};
      const ns=DB.vaultNotes;ns.unshift(nn);DB.vaultNotes=ns;
      S.activeVaultId=nn.id;S.vaultSummary='';S.vaultHasUnsaved=true;re();
    })
  ]));
  sec.appendChild(hd);

  // Unsaved banner
  if(S.vaultHasUnsaved){
    const banner=el('div',{class:'unsaved-banner'});
    banner.innerHTML='⚠️ You have unsaved changes in this note.';
    sec.appendChild(banner);
  }

  const isMobile=window.innerWidth<768;
  const layout=el('div',{style:{display:'grid',gridTemplateColumns:activeNote&&!isMobile?'255px 1fr':'1fr',gap:'18px'}});

  // Note list
  const noteList=el('div',{class:'stack'});
  if(!myNotes.length)noteList.appendChild(el('p',{style:{color:'var(--slate)',fontWeight:600}},["No vault notes yet. Click 'New Note' to start!"]));
  myNotes.forEach(note=>{
    const nc=el('div',{class:'card click',style:{border:S.activeVaultId===note.id?'2.5px solid var(--teal)':'2px solid var(--mint-l)'}});
    const nh=d('',[], {display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'});
    nh.appendChild(el('span',{style:{fontWeight:800,fontSize:'.84rem',color:'var(--navy)',lineHeight:'1.3',flex:1}},[note.title]));
    const flags=d('',[], {display:'flex',gap:'4px',flexShrink:0,marginLeft:'6px'});
    if(note.locked)flags.appendChild(el('span',{},'🔒'));
    if(note.isDraft&&!note.locked)flags.appendChild(el('span',{class:'draft-badge'},['Draft']));
    if(note.published&&!note.locked)flags.appendChild(badge('Published','green'));
    nh.appendChild(flags);
    nc.appendChild(nh);
    nc.appendChild(el('div',{style:{fontSize:'.72rem',color:'var(--slate)',marginBottom:'4px'}},[note.date+(note.lastSaved?' · Saved '+note.lastSaved.split(' ')[1]:'')]));
    nc.appendChild(el('div',{style:{fontSize:'.76rem',color:'var(--slate-l)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},[note.content.slice(0,52)+'…']));
    nc.onclick=()=>{
      if(S.vaultHasUnsaved&&S.activeVaultId!==note.id){
        openConfirm('Unsaved Changes','You have unsaved changes. Switch note without saving?',true,()=>{S.vaultHasUnsaved=false;S.activeVaultId=note.id;S.vaultSummary=note.summary||'';re();});
        return;
      }
      S.activeVaultId=note.id;S.vaultSummary=note.summary||'';re();
    };
    noteList.appendChild(nc);
  });
  layout.appendChild(noteList);

  // Note editor
  if(activeNote){
    const ed=el('div',{class:'card',style:{display:'flex',flexDirection:'column',gap:'14px'}});

    // Title row
    const titleRow=d('',[], {display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px'});
    const ti=el('input',{style:{fontFamily:"'Fraunces',serif",fontSize:'1.02rem',fontWeight:800,border:'none',outline:'none',flex:'1',background:'transparent',color:'var(--navy)'}});
    ti.value=activeNote.title;
    ti.disabled=activeNote.locked;
    ti.oninput=e=>{
      const ns=DB.vaultNotes,i=ns.findIndex(n=>n.id===activeNote.id);
      if(i>-1){ns[i].title=e.target.value;DB.vaultNotes=ns;}
      S.vaultHasUnsaved=true;
    };
    titleRow.appendChild(ti);
    const closeBtn=el('button',{style:{background:'var(--mint-ll)',border:'none',cursor:'pointer',width:'30px',height:'30px',borderRadius:'50%',fontSize:'.88rem',display:'flex',alignItems:'center',justifyContent:'center'}},['✕']);
    closeBtn.onclick=()=>{
      if(S.vaultHasUnsaved){
        openConfirm('Unsaved Changes','Close without saving?',true,()=>{S.vaultHasUnsaved=false;S.activeVaultId=null;S.vaultSummary='';re();});
        return;
      }
      S.activeVaultId=null;S.vaultSummary='';re();
    };
    titleRow.appendChild(closeBtn);
    ed.appendChild(titleRow);

    if(activeNote.locked){
      ed.appendChild(el('div',{class:'locked-badge',style:{alignSelf:'flex-start'}},['🔒 This record is permanently locked and read-only']));
    }

    // Clinical notes area
    const clinLbl=el('div',{style:{fontSize:'.69rem',fontWeight:900,color:'var(--slate)',textTransform:'uppercase',letterSpacing:'.07em'}},['📋 Clinical Notes (Private)']);
    ed.appendChild(clinLbl);
    const ta=el('textarea',{class:'inp'});
    ta.value=activeNote.content;
    ta.readOnly=activeNote.locked;
    ta.style.background=activeNote.locked?'#f8fafc':'';
    ta.oninput=e=>{
      const ns=DB.vaultNotes,i=ns.findIndex(n=>n.id===activeNote.id);
      if(i>-1){ns[i].content=e.target.value;DB.vaultNotes=ns;}
      S.vaultHasUnsaved=true;
    };
    ed.appendChild(ta);

    // Action buttons
    if(!activeNote.locked){
      const actRow=d('',[], {display:'flex',gap:'9px',flexWrap:'wrap'});

      // Save draft
      const saveDraftBtn=mkBtn('💾 Save Draft','btn-sm btn-slate',()=>{
        const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        const ns=DB.vaultNotes,i=ns.findIndex(n=>n.id===activeNote.id);
        if(i>-1){ns[i].isDraft=true;ns[i].lastSaved=new Date().toISOString().split('T')[0]+' '+now;DB.vaultNotes=ns;}
        S.vaultHasUnsaved=false;re();toast('💾 Draft saved!');
      });

      // AI Summarize
      const aiBtn=mkBtn('✨ AI Summarize','btn-sm btn-secondary',async()=>{
        if(!ta.value.trim()){toast('⚠️ Write some notes first!','error');return;}
        aiBtn.innerHTML='<span class="spinner"></span> AI is thinking…';aiBtn.disabled=true;
        S.vaultSummarizing=true;
        try{
          const resp=await fetch('https://api.anthropic.com/v1/messages',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Convert these clinical session notes into a warm, encouraging, parent-friendly summary. Avoid all clinical jargon. Be positive, supportive and specific. Keep to 3-4 sentences.\n\nClinical notes:\n${ta.value}`}]})
          });
          const data=await resp.json();
          const text=data.content?.[0]?.text||'Unable to generate summary — please write one manually.';
          const ns=DB.vaultNotes,i=ns.findIndex(n=>n.id===activeNote.id);
          if(i>-1){ns[i].summary=text;DB.vaultNotes=ns;}
          S.vaultSummary=text;S.vaultSummarizing=false;re();
        }catch(e){S.vaultSummarizing=false;S.vaultSummary='AI unavailable — please write a summary manually.';re();}
      });

      // Lock report
      const lockBtn=mkBtn('🔒 Lock Report','btn-sm btn-ghost',()=>openConfirm('Lock Report?',
        'Locking makes this a permanent, uneditable record. This cannot be undone.',true,()=>{
          const ns=DB.vaultNotes,i=ns.findIndex(n=>n.id===activeNote.id);
          if(i>-1){ns[i].locked=true;ns[i].isDraft=false;DB.vaultNotes=ns;}
          S.vaultHasUnsaved=false;re();toast('🔒 Report locked permanently!');
        }));

      actRow.appendChild(saveDraftBtn);actRow.appendChild(aiBtn);actRow.appendChild(lockBtn);
      ed.appendChild(actRow);
    }

    // Summary block
    const sumTxt=S.vaultSummary||(activeNote.summary||'');
    if(S.vaultSummarizing){
      const lb=el('div',{class:'ai-block'});
      lb.appendChild(el('div',{class:'ai-label'},['✨ AI is thinking…']));
      const ld=d('',[], {display:'flex',gap:'11px',alignItems:'center',color:'var(--slate)',fontWeight:600});
      ld.appendChild(spinner());ld.appendChild(el('span',{},'Generating parent-friendly summary…'));
      lb.appendChild(ld);
      ed.appendChild(lb);
    } else if(sumTxt){
      const ab=el('div',{class:'ai-block'});
      ab.appendChild(el('div',{class:'ai-label'},['✨ Parent-Friendly Summary']));
      const sta=el('textarea',{class:'inp',style:{background:'white',minHeight:'88px'}});
      sta.value=sumTxt;
      sta.readOnly=activeNote.locked;
      sta.oninput=e=>{
        S.vaultSummary=e.target.value;
        const ns=DB.vaultNotes,i=ns.findIndex(n=>n.id===activeNote.id);
        if(i>-1){ns[i].summary=e.target.value;DB.vaultNotes=ns;}
      };
      ab.appendChild(sta);
      if(!activeNote.locked&&!activeNote.published){
        const pubBtn=mkBtn('📤 Lock & Publish to Parent','btn-md btn-primary',()=>{
          openConfirm('Publish Summary?','Send this summary to the parent\'s profile and notify them?',false,()=>{
            const ns=DB.vaultNotes,i=ns.findIndex(n=>n.id===activeNote.id);
            if(i>-1){ns[i].published=true;ns[i].isDraft=false;DB.vaultNotes=ns;}
            pushNotif('report',`${DB.specialists.find(s=>s.id===specId)?.name||'Specialist'} published a new session summary for ${child?.name}`,S.activeChild);
            S.vaultHasUnsaved=false;re();toast('🎉 Summary published!');
          });
        });
        pubBtn.style.marginTop='12px';
        ab.appendChild(pubBtn);
      }
      ed.appendChild(ab);
    }
    layout.appendChild(ed);
  }
  sec.appendChild(layout);
  return sec;
}

function renderHomeworkParent(){
  const child=DB.children.find(c=>c.id===S.activeChild);

    [ta,sel,di].forEach(i=>ig.appendChild(i));
    mb.appendChild(ig);
    mb.appendChild(mkBtn('✅ Assign Task','btn-lg btn-primary btn-full',()=>{
      if(!ta.value.trim()||!di.value){toast('⚠️ Task and due date required.','error');return;}
      const all=DB.homework;
      const specId=session?.specialistId||'s1';
      const spec=DB.specialists.find(s=>s.id===specId);
      all.unshift({id:'h_'+Date.now(),childId:S.activeChild,task:ta.value.trim(),specialist:spec?.name||session?.name||'Specialist',specialistId:specId,due:di.value,completed:false,category:sel.value});
      DB.homework=all;
      pushNotif('homework',`New task: "${ta.value.slice(0,42)}…"`,S.activeChild);
      close();re();toast('✅ Task assigned!');
    }));
  },460);
}

/* ═══════════════════════════════════════════════
   PATIENTS LIST (Specialist)
═══════════════════════════════════════════════ */
function renderPatients(){
  const sec=el('div',{class:'section'});
  sec.appendChild(el('h2',{class:'page-title',style:{marginBottom:'6px'}},['My Patients']));
  sec.appendChild(el('p',{class:'page-sub'},['Click a patient to view their vault & files']));
  const si=el('input',{class:'inp',placeholder:'🔍 Search by name or diagnosis…',style:{marginBottom:'18px'}});
  sec.appendChild(si);

  const stack=el('div',{class:'stack'});
  const sorted=[...DB.children].sort((a,b)=>a.name.split(' ').pop().localeCompare(b.name.split(' ').pop()));

  const doFilter=q=>{
    stack.innerHTML='';
    sorted.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||c.diagnoses.some(d=>d.toLowerCase().includes(q.toLowerCase()))).forEach(c=>{
      const card=el('div',{class:'card click',style:{display:'flex',alignItems:'center',gap:'15px',border:S.activeChild===c.id?'2.5px solid var(--teal)':'2px solid var(--mint-l)'}});
      card.innerHTML=`<div style="width:52px;height:52px;border-radius:15px;background:${c.color}44;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0">${c.avatar}</div>`;
      const info=d('',[], {flex:1});
      info.appendChild(el('div',{style:{fontWeight:800,color:'var(--navy)',marginBottom:'2px'}},[c.name]));
      info.appendChild(el('div',{style:{fontSize:'.78rem',color:'var(--slate)',marginBottom:'6px'}},['Age '+c.age+' · DOB '+c.dob]));
      const dxRow=d('',[], {display:'flex',gap:'6px',flexWrap:'wrap'});
      c.diagnoses.forEach(dx=>dxRow.appendChild(badge(dx,'teal')));
      info.appendChild(dxRow);
      card.appendChild(info);
      card.appendChild(el('span',{style:{color:'var(--slate-l)',fontSize:'1.1rem',fontWeight:800}},['›']));
      card.onclick=()=>{S.activeChild=c.id;S.activeTab='vault';re();};
      stack.appendChild(card);
    });
  };
  doFilter('');
  si.oninput=e=>doFilter(e.target.value);
  sec.appendChild(si);sec.appendChild(stack);
  return sec;
}

/* ═══════════════════════════════════════════════
   CREDENTIALS / PERSONAL FOLDER (Specialist only)
═══════════════════════════════════════════════ */
function renderCredentials(){
  const specId=session?.specialistId||'s1';
  const spec=DB.specialists.find(s=>s.id===specId)||{credentials:[]};
  const sec=el('div',{class:'section'});
  const hd=el('div',{class:'sec-hd'});
  hd.appendChild(el('div',{class:'sec-hd-left'},[
    el('h2',{class:'page-title'},['🗂️ My Credentials Folder']),
    el('p',{class:'page-sub'},['Private storage for your licenses and professional documents — not visible to parents or other specialists'])
  ]));
  hd.appendChild(el('div',{class:'sec-hd-right'},[mkBtn('📤 Upload Document','btn-md btn-primary',()=>showCredentialUpload(spec,specId))]));
  sec.appendChild(hd);

  const card=el('div',{class:'card personal-folder'});
  card.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'11px',marginBottom:'16px',paddingBottom:'14px',borderBottom:'2px solid var(--lav-l)'}},
    [el('span',{style:{fontSize:'1.6rem'}},['🔐']),el('div',{},[
      el('div',{style:{fontWeight:800,color:'var(--navy)'}},['Secure Personal Storage']),
      el('div',{style:{fontSize:'.78rem',color:'var(--slate)',marginTop:'2px'}},['Only you can see these documents'])
    ])]));

  const creds=(spec.credentials||[]);
  if(!creds.length){
    card.appendChild(el('p',{style:{color:'var(--slate)',fontWeight:600,textAlign:'center',padding:'20px 0'}},['No documents uploaded yet.\nUpload your license, certifications, and professional documents here.']));
  } else {
    creds.forEach(cr=>{
      const fi=el('div',{class:'file-item'});
      fi.innerHTML=`<span style="font-size:1.3rem">📄</span><div style="flex:1"><div style="font-weight:700;font-size:.84rem;color:var(--navy)">${cr.name}</div><div style="font-size:.71rem;color:var(--slate);margin-top:2px">${cr.date} · ${cr.type}</div></div>`;
      fi.appendChild(mkBtn('🗑️','btn-sm btn-danger',()=>openConfirm('Delete Document','Remove this document permanently?',true,()=>{
        const specs=DB.specialists,i=specs.findIndex(s=>s.id===specId);
        if(i>-1){specs[i].credentials=specs[i].credentials.filter(c=>c.id!==cr.id);DB.specialists=specs;}
        re();toast('✅ Document removed.');
      })));
      card.appendChild(fi);
    });
  }
  sec.appendChild(card);

  // Categories
  const cats=['Professional License','CPD Certificate','Insurance','Registration','Other'];
  sec.appendChild(el('div',{style:{marginTop:'20px'}},[el('h3',{style:{fontWeight:800,color:'var(--navy)',marginBottom:'12px'}},['Document Categories']),
    el('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},cats.map(c=>badge(c,'lav')))]));
  return sec;
}

function showCredentialUpload(spec,specId){
  const fi=el('input',{type:'file',style:{display:'none'}});
  fi.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    openModal('📤 Upload Credential',(mb,close)=>{
      mb.appendChild(el('p',{style:{color:'var(--slate)',marginBottom:'14px',fontWeight:600}},['Uploading: '+file.name]));
      const typeSel=el('select',{class:'inp',style:{marginBottom:'14px'}});
      ['Professional License','CPD Certificate','Insurance','Registration','Other'].forEach(v=>{const o=el('option');o.value=v;o.textContent=v;typeSel.appendChild(o);});
      mb.appendChild(typeSel);
      const upBtn=mkBtn('📤 Upload','btn-lg btn-primary btn-full',async()=>{
        upBtn.innerHTML='<span class="spinner"></span> Uploading…';upBtn.disabled=true;
        try{
          const ab=await file.arrayBuffer();
          const resp=await fetch('https://content.dropboxapi.com/2/files/upload',{
            method:'POST',
            headers:{Authorization:'Bearer '+DROPBOX_TOKEN,'Content-Type':'application/octet-stream',
              'Dropbox-API-Arg':JSON.stringify({path:`/Huddledin/Specialists/${spec.name}/Credentials/${file.name}`,mode:'add',autorename:true})},body:ab
          });
          const data=await resp.json();
          const specs=DB.specialists,i=specs.findIndex(s=>s.id===specId);
          if(i>-1){
            if(!specs[i].credentials)specs[i].credentials=[];
            specs[i].credentials.push({id:'cr_'+Date.now(),name:data.name||file.name,date:new Date().toISOString().split('T')[0],type:typeSel.value});
            DB.specialists=specs;
          }
          close();re();toast('✅ Credential uploaded to your private folder!');
        }catch(e){close();toast('❌ Upload failed: '+e.message,'error');}
      });
      mb.appendChild(upBtn);
    },440);
  };
  document.body.appendChild(fi);fi.click();
}

/* ═══════════════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════════════ */
function renderNotifications(){
  const sec=el('div',{class:'section'});
  sec.appendChild(el('h2',{class:'page-title',style:{marginBottom:'20px'}},['Notifications']));
  const notifs=DB.notifications;
  if(!notifs.length){sec.appendChild(p('All caught up! 🎉'));return sec;}
  const stack=el('div',{class:'stack'});
  notifs.forEach(n=>{
    const card=el('div',{class:'card hov',style:{display:'flex',gap:'13px',alignItems:'flex-start',background:n.read?'#fff':'var(--mint-l)',border:n.read?'2px solid var(--mint-l)':'2.5px solid var(--teal-l)',cursor:'pointer'}});
    card.innerHTML=`<span style="font-size:1.45rem">${notifIcon[n.type]||'📢'}</span><div style="flex:1"><div style="font-weight:${n.read?600:800};color:var(--navy);line-height:1.4;margin-bottom:3px">${n.msg}</div><div style="font-size:.72rem;color:var(--slate-l)">${n.time}</div></div>`;
    if(!n.read)card.appendChild(badge('New','teal'));
    card.onclick=()=>{
      const ns=DB.notifications,i=ns.findIndex(x=>x.id===n.id);
      if(i>-1){ns[i].read=true;DB.notifications=ns;re();}
    };
    stack.appendChild(card);
  });
  sec.appendChild(stack);
  return sec;
}

/* ═══════════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════════ */
function renderSettings(){
  const sec=el('div',{class:'section'});
  sec.appendChild(el('h2',{class:'page-title',style:{marginBottom:'24px'}},['Settings']));

  // Notif prefs
  const nc=el('div',{class:'card',style:{marginBottom:'16px'}});
  nc.appendChild(el('h3',{style:{fontWeight:800,color:'var(--navy)',marginBottom:'16px'}},['🔔 Notification Preferences']));
  const prefs=DB.notifPrefs;
  Object.entries(prefs).forEach(([key,val])=>{
    const row=d('',[], {display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--mint-ll)'});
    row.appendChild(el('div',{},[
      el('div',{style:{fontWeight:700,color:'var(--navy)',textTransform:'capitalize'}},[key+' notifications']),
      el('div',{style:{fontSize:'.76rem',color:'var(--slate)',marginTop:'2px'}},['Alerts for '+key+' activity'])
    ]));
    const tog=el('button',{class:'toggle'+(val?' on':'')});
    tog.onclick=()=>{prefs[key]=!prefs[key];DB.notifPrefs=prefs;tog.className='toggle'+(prefs[key]?' on':'');};
    row.appendChild(tog);nc.appendChild(row);
  });
  sec.appendChild(nc);

  // Calendar sync
  const cc=el('div',{class:'card',style:{marginBottom:'16px'}});
  cc.appendChild(el('h3',{style:{fontWeight:800,color:'var(--navy)',marginBottom:'14px'}},['📅 Calendar Sync']));
  cc.appendChild(el('p',{style:{color:'var(--slate)',fontSize:'.86rem',marginBottom:'14px',lineHeight:'1.6',fontWeight:500}},
    ['Connect your calendar to sync appointments automatically.']));
  const calBtns=d('',[], {display:'flex',gap:'10px',flexWrap:'wrap'});
  ['📅 Google Calendar','🍎 Apple iCal','📧 Outlook'].forEach(b=>{
    calBtns.appendChild(mkBtn(b,'btn-md btn-ghost',()=>toast('🔗 '+b+' sync — coming soon!','info')));
  });
  cc.appendChild(calBtns);
  sec.appendChild(cc);

  // Account
  const ac=el('div',{class:'card',style:{marginBottom:'16px'}});
  ac.appendChild(el('h3',{style:{fontWeight:800,color:'var(--navy)',marginBottom:'14px'}},['👤 Account']));
  ac.appendChild(el('p',{style:{color:'var(--slate)',fontSize:'.86rem',marginBottom:'4px',fontWeight:600}},['Email: '+session?.email]));
  ac.appendChild(el('p',{style:{color:'var(--slate)',fontSize:'.86rem',marginBottom:'14px',fontWeight:500}},['Role: '+(session?.role==='parent'?'Parent / Guardian':'Specialist / Therapist')]));
  const acBtns=d('',[], {display:'flex',gap:'10px'});
  acBtns.appendChild(mkBtn('Sign Out','btn-md btn-danger',()=>{doLogout();re();}));
  ac.appendChild(acBtns);
  sec.appendChild(ac);

  // Privacy
  const pc=el('div',{class:'card'});
  pc.appendChild(el('h3',{style:{fontWeight:800,color:'var(--navy)',marginBottom:'12px'}},['🔒 Privacy & Security']));
  pc.appendChild(el('p',{style:{color:'var(--slate)',fontSize:'.84rem',lineHeight:'1.7',fontWeight:500}},
    ['All session data is stored in your browser\'s local storage and in Dropbox (for uploaded files). Specialists only see files and appointments explicitly shared with them. When a specialist is removed from a care team, they retain a Legacy Archive of only their own authored notes — all other access is revoked immediately.']));
  sec.appendChild(pc);
  return sec;
}

function re(){
  const root=document.getElementById('root');
  root.innerHTML='';
  root.appendChild(session?renderShell():renderAuth());
}

initData();
re();
