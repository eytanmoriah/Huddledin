/* -----------------------------------------------
   SPECIALIST CLINICAL TASK MANAGER
   A focused task manager for clinical work —
   separate from the parent personal to-do list.
----------------------------------------------- */
function renderSpecTodo(){
  const specId=session?.specialistId||session?.id;
  const allTasks=(DB.specTasks||[]).filter(t=>t.specialistId===specId||t.specialist_id===specId);
  const children=DB.children.length?DB.children:LS.get('children',[]);

  const CATEGORIES=['All','Follow-up','Report Due','Assessment','IEP/EHCP','Referral','Parent Comms','Admin','Other'];
  const PRIORITIES=[{v:'urgent',label:'🔴 Urgent',color:'var(--coral)'},{v:'normal',label:'🟡 Normal',color:'var(--amber)'},{v:'low',label:'🟢 Low',color:'var(--teal)'}];

  const activeFilter=S._specTaskFilter||'All';

  const filtered=allTasks.filter(t=>{
    if(activeFilter==='All')return true;
    return (t.category||'Other')===activeFilter;
  });
  const pending=filtered.filter(t=>!t.completed).sort((a,b)=>{
    // Urgent first, then by due date
    const pa=a.priority==='urgent'?0:a.priority==='low'?2:1;
    const pb=b.priority==='urgent'?0:b.priority==='low'?2:1;
    if(pa!==pb)return pa-pb;
    if(a.dueDate&&b.dueDate)return a.dueDate.localeCompare(b.dueDate);
    if(a.dueDate)return -1;if(b.dueDate)return 1;
    return 0;
  });
  const done=filtered.filter(t=>t.completed).sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));

  const sec=el('div',{class:'section'});
  const hd=el('div',{class:'sec-hd'});
  hd.appendChild(el('div',{class:'sec-hd-left'},[
    el('h2',{class:'page-title'},['✅ Clinical Tasks']),
    el('p',{class:'page-sub'},['Follow-ups, reports, referrals and reminders'])
  ]));
  hd.appendChild(el('div',{class:'sec-hd-right'},[
    mkBtn('➕ New Task','btn-md btn-primary',()=>showSpecTaskModal())
  ]));
  sec.appendChild(hd);

  // Stats row
  const urgentCount=allTasks.filter(t=>!t.completed&&t.priority==='urgent').length;
  const overdueCount=allTasks.filter(t=>!t.completed&&t.dueDate&&t.dueDate<new Date().toISOString().split('T')[0]).length;
  const todayStr=new Date().toISOString().split('T')[0];
  const todayCount=allTasks.filter(t=>!t.completed&&t.dueDate===todayStr).length;

  if(urgentCount||overdueCount||todayCount){
    const statsRow=el('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'16px'}});
    if(urgentCount)statsRow.appendChild(el('div',{style:{background:'#fff1f0',border:'1.5px solid var(--coral)',borderRadius:'10px',padding:'8px 14px',fontSize:'.78rem',fontWeight:800,color:'var(--coral)'}},[urgentCount+' Urgent']));
    if(overdueCount)statsRow.appendChild(el('div',{style:{background:'#fff7ed',border:'1.5px solid #f97316',borderRadius:'10px',padding:'8px 14px',fontSize:'.78rem',fontWeight:800,color:'#f97316'}},[overdueCount+' Overdue']));
    if(todayCount)statsRow.appendChild(el('div',{style:{background:'#ecfdf5',border:'1.5px solid var(--teal)',borderRadius:'10px',padding:'8px 14px',fontSize:'.78rem',fontWeight:800,color:'var(--teal)'}},[todayCount+' Due Today']));
    sec.appendChild(statsRow);
  }

  // Category filter chips
  const filterRow=el('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'16px',overflowX:'auto',paddingBottom:'4px'}});
  CATEGORIES.forEach(cat=>{
    const count=cat==='All'?allTasks.filter(t=>!t.completed).length:allTasks.filter(t=>!t.completed&&(t.category||'Other')===cat).length;
    if(cat!=='All'&&count===0)return; // hide empty categories
    const isActive=activeFilter===cat;
    const chip=el('button',{style:{
      padding:'5px 13px',borderRadius:'99px',border:'1.5px solid '+(isActive?'var(--teal)':'var(--mint-l)'),
      background:isActive?'var(--teal)':'#fff',color:isActive?'#fff':'var(--navy)',
      fontWeight:700,fontSize:'.76rem',cursor:'pointer',whiteSpace:'nowrap',flexShrink:0
    }},[cat+(count?` (${count})`:'')]);
    chip.onclick=()=>{S._specTaskFilter=cat;re();};
    filterRow.appendChild(chip);
  });
  sec.appendChild(filterRow);

  if(!allTasks.length){
    sec.appendChild(el('div',{class:'empty-state'},[
      el('span',{class:'empty-state-icon'},['✅']),
      el('div',{class:'empty-state-title'},['No tasks yet']),
      el('div',{class:'empty-state-body'},['Add clinical tasks — follow-ups, reports, referrals — to stay on top of your caseload.'])
    ]));
    return sec;
  }

  // Pending tasks
  if(pending.length){
    sec.appendChild(el('div',{style:{fontWeight:800,fontSize:'.76rem',color:'var(--navy)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},['Pending ('+pending.length+')']));
    const stack=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'20px'}});
    pending.forEach(task=>_renderSpecTaskCard(task,stack,specId,children));
    sec.appendChild(stack);
  }

  // Done tasks (collapsible, max 10)
  if(done.length){
    const doneHd=el('div',{style:{fontWeight:800,fontSize:'.76rem',color:'var(--slate)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px'}});
    doneHd.appendChild(el('span',{},[`Completed (${done.length})`]));
    doneHd.appendChild(el('span',{style:{fontSize:'.8rem',color:'var(--slate-l)'}},[S._specTaskDoneOpen?'▲':'▼']));
    doneHd.onclick=()=>{S._specTaskDoneOpen=!S._specTaskDoneOpen;re();};
    sec.appendChild(doneHd);
    if(S._specTaskDoneOpen){
      const doneStack=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}});
      done.slice(0,10).forEach(task=>_renderSpecTaskCard(task,doneStack,specId,children));
      sec.appendChild(doneStack);
    }
  }

  return sec;
}

function _renderSpecTaskCard(task,container,specId,children){
  const child=task.childId?(children.find(c=>c.id===task.childId)):null;
  const today=new Date().toISOString().split('T')[0];
  const isOverdue=task.dueDate&&!task.completed&&task.dueDate<today;
  const isDueToday=task.dueDate===today&&!task.completed;

  const priorityColor=task.priority==='urgent'?'var(--coral)':task.priority==='low'?'var(--teal)':'var(--amber)';

  const card=el('div',{class:'card',style:{
    display:'flex',gap:'12px',alignItems:'flex-start',
    borderLeft:'4px solid '+(task.completed?'var(--mint-l)':isOverdue?'var(--coral)':isDueToday?'#f59e0b':priorityColor),
    opacity:task.completed?'0.6':'1',padding:'12px 14px'
  }});

  // Checkbox
  const chk=el('div',{class:'chk'+(task.completed?' done':'')},task.completed?['✓']:[]);
  chk.style.cssText='flex-shrink:0;margin-top:2px;';
  chk.onclick=async()=>{
    const nowDone=!task.completed;
    const all=DB.specTasks,i=all.findIndex(t=>t.id===task.id);
    if(i>-1){all[i].completed=nowDone;all[i].completedAt=nowDone?new Date().toISOString():null;DB.specTasks=all;}
    try{await _supa.from('spec_tasks').update({completed:nowDone,completed_at:nowDone?new Date().toISOString():null}).eq('id',task.id);}catch(e){}
    re();
  };
  card.appendChild(chk);

  const info=el('div',{style:{flex:1,minWidth:0}});
  info.appendChild(el('div',{style:{
    fontWeight:700,fontSize:'.87rem',lineHeight:'1.4',marginBottom:'5px',
    color:task.completed?'var(--slate-l)':'var(--navy)',
    textDecoration:task.completed?'line-through':'none'
  }},[task.title||'Task']));

  const meta=el('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',alignItems:'center'}});
  // Category badge
  if(task.category&&task.category!=='Other')meta.appendChild(badge(task.category,'teal'));
  // Patient link
  if(child)meta.appendChild(el('span',{style:{fontSize:'.7rem',fontWeight:700,color:'var(--slate)',background:'var(--mint-ll)',padding:'2px 8px',borderRadius:'99px'}},[child.avatar+' '+child.name]));
  // Due date
  if(task.dueDate){
    const dueStyle={fontSize:'.7rem',fontWeight:700,color:isOverdue?'var(--coral)':isDueToday?'#f59e0b':'var(--slate)'};
    meta.appendChild(el('span',{style:dueStyle},[isOverdue?'⚠️ Overdue: '+task.dueDate:isDueToday?'📅 Due today':'📅 '+task.dueDate]));
  }
  // Reminder
  if(task.reminder&&task.reminder!=='none')meta.appendChild(el('span',{style:{fontSize:'.7rem',color:'var(--slate)',fontWeight:600}},['🔔 '+task.reminder.replace(/-/g,' ')]));
  if(meta.childNodes.length)info.appendChild(meta);

  // Notes preview
  if(task.notes&&!task.completed){
    info.appendChild(el('div',{style:{fontSize:'.74rem',color:'var(--slate)',marginTop:'5px',lineHeight:'1.4',fontStyle:'italic'}},[task.notes.slice(0,80)+(task.notes.length>80?'…':'')]));
  }

  card.appendChild(info);

  if(!task.completed){
    const editBtn=mkBtn('✏️','btn-sm btn-ghost',()=>showSpecTaskModal(task));
    editBtn.style.flexShrink='0';
    card.appendChild(editBtn);
  }

  container.appendChild(card);
}

          }

          await _supa.from('todo_reminders').upsert({

            child_id:todo.childId||null,
            sent:false

      }

      close();re();
      toast(existing?'✅ Task updated!':'✅ Task added!','success');
    }));
  },520);
}

function calculateCompletionRate(occurrences){
  const today=new Date().toISOString().split('T')[0];
  const past=(occurrences||[]).filter(o=>(o.date||o.scheduled_date)<=today);
  if(!past.length)return{completed:0,total:0,rate:'0%',calendar:[]};
  const completed=past.filter(o=>o.status==='completed').length;
  const rate=Math.round((completed/past.length)*100)+'%';
  const calendar=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];const occ=(occurrences||[]).find(o=>(o.date||o.scheduled_date)===ds);calendar.push({date:ds,status:occ?.status||'none'});}
  return{completed,total:past.length,rate,calendar};
}

async function _generateOccurrences(task){
  // Bug2: use task's created_at UTC date as reference — matches isScheduledDay
  const todayStr=(task.created_at||new Date().toISOString()).split('T')[0];
  const today=new Date(todayStr+'T00:00:00');
  const dates=[];
  const dayMap={mon:1,tue:2,wed:3,thu:4,fri:5,sat:6,sun:0};
  if(task.recurrence==='once'){
    dates.push(todayStr);
  } else {
    let endDate=new Date(today);
    if(task.duration_type==='end_date'&&task.end_date){endDate=new Date(task.end_date+'T23:59:59');}
    else{endDate.setDate(endDate.getDate()+30);}
    let cur=new Date(today);
    while(cur<=endDate&&dates.length<60){
      const daysFromStart=Math.round((cur-today)/86400000);
      const dow=cur.getDay();
      let inc=false;
      if(task.recurrence==='daily')inc=true;
      else if(task.recurrence==='every_other_day')inc=(daysFromStart%2===0);
      else if(task.recurrence==='specific_days')inc=(task.specific_days||[]).some(d=>dayMap[d]===dow);
      if(inc)dates.push(cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0'));
      cur.setDate(cur.getDate()+1);
    }
  }
  if(!dates.length)return;
  // Bug7: one row per time-of-day per date
  const times=(task.time_of_day||'morning').split(',').filter(Boolean);
  const rows=[];
  dates.forEach(date=>{times.forEach(tod=>{rows.push({task_id:task.id,child_id:task.child_id,household_id:task.household_id,scheduled_date:date,status:'pending',acknowledged_by_parent:false,time_of_day:tod});});});
  for(let i=0;i<rows.length;i+=50){
    const {error}=await _supa.from('homework_occurrences').insert(rows.slice(i,i+50));
    if(error)throw error;
  }
}

function _hwRecLabel(task){
  if(task.recurrence==='once')return'Once';
  if(task.recurrence==='daily')return'Daily';
  if(task.recurrence==='every_other_day')return'Every other day';
  return(task.specificDays||[]).map(d=>d.charAt(0).toUpperCase()+d.slice(1)).join(', ')||'Custom';
}

function _hwDiffBadge(diff){
  if(!diff)return null;
  const col=diff==='easy'?'green':diff==='hard'?'rose':'amber';
  return badge(diff.charAt(0).toUpperCase()+diff.slice(1),col);
}

function _hwCalRow(occurrences,startDaysAgo,numDays,showFuture,onClickOcc){
  const row=el('div',{style:{display:'flex',gap:'6px',overflowX:'auto',paddingBottom:'4px'}});
  const today=new Date().toISOString().split('T')[0];
  for(let i=startDaysAgo;i<startDaysAgo+numDays;i++){
    const d=new Date();d.setDate(d.getDate()-i*-1+(startDaysAgo>=0?-startDaysAgo:0));
    // Recalculate: i goes from 0..numDays-1, offset by startDaysAgo
    const dd=new Date();dd.setDate(dd.getDate()+i-(startDaysAgo>=0?startDaysAgo:0));
    const ds=dd.toISOString().split('T')[0];
    const occ=(occurrences||[]).find(o=>(o.date||o.scheduled_date)===ds);
    const st=occ?.status||'none';
    const isFut=ds>today;
    const bg=st==='completed'?'var(--teal)':st==='missed'?'var(--rose-l)':st==='pending'&&!isFut?'var(--amber-l)':'var(--mint-ll)';
    const col=st==='completed'?'#fff':st==='missed'?'#be123c':st==='pending'&&!isFut?'#92400e':'var(--slate)';
    const icon=st==='completed'?'✅':st==='missed'?'❌':st==='pending'&&!isFut?'⏳':'○';
    const chip=el('div',{class:'hw-cal-chip'+(onClickOcc&&occ&&st!=='completed'?' clickable':''),style:{background:bg,minWidth:'38px'}});
    chip.appendChild(el('div',{class:'hw-cal-chip-label',style:{color:col}},[dd.toLocaleDateString([],{weekday:'short'})]));
    chip.appendChild(el('div',{class:'hw-cal-chip-num',style:{color:col}},[String(dd.getDate())]));
    chip.appendChild(el('div',{class:'hw-cal-chip-icon'},[icon]));
    if(onClickOcc&&occ&&st!=='completed')chip.onclick=()=>onClickOcc(occ);
    row.appendChild(chip);
  }
  return row;
}

function isScheduledDay(task,dateStr){
  // Bug3: never show scheduled before task was created
  const _cAtStr=task.createdAt||task.created_at||'';
  const _cAt=_cAtStr?new Date(_cAtStr):new Date();
  const startDateStr=_cAt.getFullYear()+'-'+String(_cAt.getMonth()+1).padStart(2,'0')+'-'+String(_cAt.getDate()).padStart(2,'0');
  if(startDateStr&&dateStr<startDateStr)return false;
  const d=new Date(dateStr+'T12:00:00');
  const day=['sun','mon','tue','wed','thu','fri','sat'][d.getDay()];
  if(task.recurrence==='daily')return true;
  if(task.recurrence==='specific_days')return (task.specificDays||[]).includes(day);
  if(task.recurrence==='every_other_day'){
    const start=new Date(startDateStr+'T12:00:00');
    const diff=Math.round((d.getTime()-start.getTime())/(1000*60*60*24));
    return diff>=0&&diff%2===0;
  }
  if(task.recurrence==='once'){return dateStr===startDateStr;}
  return true;
}

/* -----------------------------------------------
   HOMEWORK — ICS CALENDAR EXPORT
----------------------------------------------- */
function generateICS(task,occs,reminderTime,slotTimesMap){
  const[rh,rm]=(reminderTime||'08:00').split(':');
  const pad=n=>String(n).padStart(2,'0');
  // Bug5: RFC 5545 — add DTSTAMP, fix DTEND, fix TRIGGER
  const dtstamp=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const _slotTimes={morning:'080000',afternoon:'140000',evening:'190000'};
  const events=occs.map(occ=>{
    const ds=(occ.date||occ.scheduled_date||'').replace(/-/g,'');
    if(!ds)return '';
    // Bug8: use time slot if available, else use reminder time
    const slot=occ.timeOfDay||occ.time_of_day||null;
    let timeStr;if(slot&&slotTimesMap&&slotTimesMap[slot]){const[_sh,_sm]=(slotTimesMap[slot]).split(':');timeStr=_sh.padStart(2,'0')+_sm.padStart(2,'0')+'00';}else if(slot){timeStr=_slotTimes[slot]||'080000';}else{timeStr=pad(rh)+pad(rm)+'00';}
    // Treat user time as LOCAL, convert to UTC for ICS
    const _localStart=new Date(ds.slice(0,4)+'-'+ds.slice(4,6)+'-'+ds.slice(6,8)+'T'+timeStr.slice(0,2)+':'+timeStr.slice(2,4)+':00');
    const dtStart=_localStart.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
    const dtEnd=new Date(_localStart.getTime()+30*60000).toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
    const uid='huddledin-'+task.id+'-'+ds+(slot?'-'+slot:'')+'@huddledin.app';
    const slotLabel=slot?(slot.charAt(0).toUpperCase()+slot.slice(1)):'';
    const rawTitle='Huddledin: '+task.title+(slotLabel?' \u2014 '+slotLabel:'');
    const summary=rawTitle.replace(/,/g,'\\,').replace(/;/g,'\\;');
    const desc=((task.description||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;'))+'\\nAssigned by: '+(task.specialistName||'Specialist')+'\\nDifficulty: '+(task.difficulty||'');
    return ['BEGIN:VEVENT','UID:'+uid,'DTSTAMP:'+dtstamp,'DTSTART:'+dtStart,'DTEND:'+dtEnd,'SUMMARY:'+summary,'DESCRIPTION:'+desc,'BEGIN:VALARM','TRIGGER:-PT15M','ACTION:DISPLAY','DESCRIPTION:Reminder: '+task.title,'END:VALARM','END:VEVENT'].join('\r\n');
  }).filter(Boolean);
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Huddledin//Homework Reminders//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',...events,'END:VCALENDAR'].join('\r\n');
}

function addTaskToCalendar(taskId){
  const task=(DB.homeworkTasks||[]).find(t=>t.id===taskId);
  if(!task)return;
  const _slots=(task.timeOfDay||'').split(',').map(s=>s.trim()).filter(Boolean);
  let reminderTime,slotTimesMap;
  if(_slots.length>1){slotTimesMap={};let _any=false;_slots.forEach(sl=>{const inp=document.getElementById('rem-inp-'+taskId+'-'+sl);if(inp?.value){slotTimesMap[sl]=inp.value;_any=true;}});if(!_any){toast('Set at least one reminder time, then tap Add to Calendar.','error',4000);return;}}else{const remInp=document.getElementById('rem-inp-'+taskId);reminderTime=remInp?.value;if(!reminderTime){toast('Set a reminder time first, then tap Add to Calendar.','error',4000);return;}}
  const _tnow2=new Date();const today=_tnow2.getFullYear()+'-'+String(_tnow2.getMonth()+1).padStart(2,'0')+'-'+String(_tnow2.getDate()).padStart(2,'0');
  const occs=(DB.homeworkOccurrences||[]).filter(o=>o.taskId===taskId&&(o.date||'')>=today).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!occs.length){toast('No upcoming scheduled days found for this task.','error',4000);return;}
  const ics=generateICS(task,occs,reminderTime,slotTimesMap);
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=task.title.slice(0,50).replace(/\s+/g,'_')+'_reminders.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('📅 '+occs.length+' reminder'+(occs.length>1?'s':'')+' ready — open the .ics file to import into your calendar app.','success',5000);
}

      el('div',{class:'empty-state-title'},[tab==='active'?'No tasks yet':'No archived tasks']),
      el('div',{class:'empty-state-body'},[tab==='active'?'Your care team will assign tasks here.':'Completed or paused tasks will appear here.'])

  tasks.forEach(task=>{
    const taskOccs=allOccs.filter(o=>o.taskId===task.id);
    const _TOrd={morning:0,afternoon:1,evening:2};
    const todayOccs=taskOccs.filter(o=>o.date===today).sort((a,b)=>(_TOrd[a.timeOfDay]||0)-(_TOrd[b.timeOfDay]||0));
    const isExpanded=S._hwExpandedId===task.id;
    const isNew=taskOccs.some(o=>!o.acknowledgedByParent);
    const card=el('div',{class:'card',style:{marginBottom:'12px',borderLeft:'4px solid '+childColor,opacity:task.isPaused?'.65':'1'}});
    // Header row
    const hdr=el('div',{style:{display:'flex',alignItems:'center',gap:'11px',padding:'2px 0'}});
    // Today's checkbox(es) — one per time-of-day slot
    const _noTask=!todayOccs.length;
    const chkWrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'3px',flexShrink:0}});
    if(_noTask){
      chkWrap.appendChild(el('div',{class:'chk',style:{opacity:'.3'}},['—']));
    } else if(todayOccs.length===1){
      const _o=todayOccs[0];const _st=_o.status||'none';
      const _c=el('div',{class:'chk'+(_st==='completed'?' done':_st==='missed'?' missed':''),style:{flexShrink:0}},[_st==='completed'?'✓':_st==='missed'?'✗':'']);
      if(_st!=='completed')_c.onclick=e=>{e.stopPropagation();showCheckOffModal(_o,task,childColor);};
      chkWrap.appendChild(_c);
    } else {
      todayOccs.forEach(_o=>{
        const _st=_o.status||'none';
        const _lbl=(_o.timeOfDay||'').slice(0,3);
        const _row=el('div',{style:{display:'flex',alignItems:'center',gap:'3px'}});
        const _c=el('div',{class:'chk'+(_st==='completed'?' done':_st==='missed'?' missed':''),style:{width:'26px',height:'26px',fontSize:'.55rem',flexShrink:0}},[_st==='completed'?'✓':_st==='missed'?'✗':'']);
        if(_st!=='completed')_c.onclick=e=>{e.stopPropagation();showCheckOffModal(_o,task,childColor);};
        _row.appendChild(_c);_row.appendChild(el('span',{style:{fontSize:'.58rem',color:'var(--slate)',fontWeight:600}},[_lbl]));
        chkWrap.appendChild(_row);
      });
    }
    hdr.appendChild(chkWrap);
    const titleWrap=el('div',{style:{flex:1,minWidth:0}});
    const titleRow=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}});
    if(task.isPinned)titleRow.appendChild(el('span',{style:{fontSize:'.75rem'}},['📌']));
    titleRow.appendChild(el('span',{style:{fontWeight:700,color:'var(--navy)',fontSize:'.88rem'}},[task.title]));
    if(isNew)titleRow.appendChild(badge('NEW','lav'));
    if(task.isPaused)titleRow.appendChild(badge('Paused','slate'));
    const db=_hwDiffBadge(task.difficulty);if(db)titleRow.appendChild(db);
    titleWrap.appendChild(titleRow);
    const _subRow=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginTop:'2px',flexWrap:'wrap'}});
    _subRow.appendChild(el('span',{style:{fontSize:'.71rem',color:'var(--slate)',fontWeight:600}},[_hwRecLabel(task)+' · by '+task.specialistName]));
    const _specData=(DB.specialists||[]).find(s=>s.id===task.specialistId);
    const _prof=_specData?.role;
    if(_prof&&_prof!=='Specialist')_subRow.appendChild(el('span',{style:{fontSize:'.62rem',fontWeight:700,color:'var(--teal)',background:'var(--mint-ll)',borderRadius:'99px',padding:'2px 7px',flexShrink:0}},[_prof]));
    titleWrap.appendChild(_subRow);
    hdr.appendChild(titleWrap);
    const arrowBtn=el('button',{style:{fontSize:'.78rem',color:'var(--slate-l)',flexShrink:0,background:'none',border:'none',cursor:'pointer',minWidth:'44px',minHeight:'44px',display:'flex',alignItems:'center',justifyContent:'center'}},[isExpanded?'▲':'▼']);
    arrowBtn.onclick=e=>{e.stopPropagation();S._hwExpandedId=isExpanded?null:task.id;re();};
    hdr.appendChild(arrowBtn);
    hdr.style.cursor='pointer';
    hdr.onclick=e=>{if(chkWrap.contains(e.target)||arrowBtn.contains(e.target))return;S._hwExpandedId=isExpanded?null:task.id;re();};
    card.appendChild(hdr);
    // Expanded detail
    if(isExpanded){
      const detail=el('div',{style:{marginTop:'12px',paddingTop:'12px',borderTop:'1px solid var(--mint-l)'}});
      if(task.description)detail.appendChild(el('p',{style:{fontSize:'.84rem',color:'var(--slate)',lineHeight:'1.65',marginBottom:'12px'}},[task.description]));

        detail.appendChild(el('div',{style:{fontSize:'.68rem',fontWeight:800,color:'var(--slate)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'6px'}},['📎 Attachments']));

        (task.attachedFileUrls||[]).forEach((url,i)=>{
          const name=(task.attachedFileNames||[])[i]||'File '+(i+1);
          const isImg=/\.(png|jpe?g|gif|webp|heic)(\?|$)/i.test(url);
          const fc=el('a',{href:url,target:'_blank',rel:'noopener',style:{display:'flex',alignItems:'center',gap:'6px',border:'1.5px solid var(--mint-l)',borderRadius:'8px',padding:'7px 10px',background:'var(--mint-ll)',textDecoration:'none',color:'var(--navy)',minHeight:'44px',maxWidth:'160px'}});
          if(isImg){fc.appendChild(el('img',{src:url,style:{width:'36px',height:'36px',objectFit:'cover',borderRadius:'4px',flexShrink:'0'}}));}
          else{fc.appendChild(el('span',{style:{fontSize:'1.2rem'}},['📄']));}
          fc.appendChild(el('span',{style:{fontSize:'.76rem',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'90px'}},[name]));
          _fRow.appendChild(fc);
        });
        detail.appendChild(_fRow);
      }
      // Next 7 days occurrence row
      detail.appendChild(el('div',{style:{fontSize:'.68rem',fontWeight:800,color:'var(--slate)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'6px'}},['Next 7 Days']));
      const calRow=el('div',{style:{display:'flex',gap:'5px',marginBottom:'14px',overflowX:'auto',paddingBottom:'4px'}});
      for(let i=0;i<7;i++){
        const d=new Date();d.setDate(d.getDate()+i);
        const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        const _dayOccs=taskOccs.filter(o=>o.date===ds);
        const _allDone=_dayOccs.length>0&&_dayOccs.every(o=>o.status==='completed');
        const _someDone=_dayOccs.some(o=>o.status==='completed');
        const _anyMissed=_dayOccs.some(o=>o.status==='missed');
        const st=_allDone?'completed':_someDone?'partial':_anyMissed?'missed':_dayOccs.length?'pending':'none';
        const occ=_dayOccs.find(o=>o.status!=='completed')||_dayOccs[0];
        const isToday=ds===today;const isFuture=ds>today;
        const isSched=isScheduledDay(task,ds);
        const bg=!isSched?'transparent':st==='completed'?'var(--teal)':st==='partial'?'var(--amber-l)':st==='missed'?'var(--rose-l)':isToday?'var(--amber-l)':'var(--mint-ll)';
        const col=st==='completed'?'#fff':st==='missed'?'#be123c':(isToday&&isSched)||st==='partial'?'#92400e':'var(--slate)';
        const icon=!isSched?'·':st==='completed'?'✅':st==='partial'?'🔶':isFuture?'○':isToday?'⏳':'○';
        const chip=el('div',{class:'hw-cal-chip'+(isToday&&isSched&&st!=='completed'?' clickable':''),style:{background:bg,minWidth:'38px',opacity:!isSched?'.3':'1',border:isToday&&isSched?'1.5px solid '+childColor:'none',boxSizing:'border-box'}});
        chip.appendChild(el('div',{class:'hw-cal-chip-label',style:{color:col,fontWeight:isToday?'800':'600'}},[d.toLocaleDateString([],{weekday:'short'})]));
        chip.appendChild(el('div',{class:'hw-cal-chip-num',style:{color:col}},[String(d.getDate())]));
        chip.appendChild(el('div',{class:'hw-cal-chip-icon'},[icon]));
        if(isToday&&isSched&&occ&&st!=='completed')chip.onclick=()=>showCheckOffModal(occ,task,childColor);
        calRow.appendChild(chip);
      }
      detail.appendChild(calRow);
      // Bug1: specialist comments for this task
      const _hwCmts=(DB.homeworkComments||[]).filter(c=>c.taskId===task.id);
      if(_hwCmts.length){
        detail.appendChild(el('div',{style:{fontSize:'.68rem',fontWeight:800,color:'var(--slate)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'6px',marginTop:'8px'}},['💬 Specialist Feedback']));
        _hwCmts.slice(-5).forEach(c=>{
          const _ce=el('div',{style:{background:'var(--mint-ll)',borderRadius:'8px',padding:'9px 11px',marginBottom:'6px',fontSize:'.8rem',color:'var(--navy)',lineHeight:'1.5'}});
          _ce.appendChild(el('div',{style:{fontSize:'.68rem',fontWeight:700,color:'var(--teal)',marginBottom:'2px'}},[new Date(c.createdAt).toLocaleDateString([],{month:'short',day:'numeric'})]));
          _ce.appendChild(el('div',{},[c.comment]));
          detail.appendChild(_ce);
        });
      }
      // Acknowledge button
      if(isNew){
        const ackBtn=mkBtn('✓ Accept this task','btn-sm btn-primary',async()=>{
          if(session?.id==='demo'){toast('Demo mode.','error');return;}
          try{
            const unackedIds=taskOccs.filter(o=>!o.acknowledgedByParent).map(o=>o.id);
            if(unackedIds.length)await _supa.from('homework_occurrences').update({acknowledged_by_parent:true,acknowledged_at:new Date().toISOString()}).in('id',unackedIds);
            const all=DB.homeworkOccurrences||[];
            all.forEach(o=>{if(unackedIds.includes(o.id))o.acknowledgedByParent=true;});
            DB.homeworkOccurrences=all;
            await notifyOtherParty('homework','✓ Parent accepted: "'+task.title.slice(0,42)+'"',S.activeChild,'homework');
            toast('Task accepted!');re();
          }catch(e){console.error('ack task:',e);toast('Could not acknowledge.','error');}
        });
        ackBtn.style.marginBottom='8px';
        detail.appendChild(ackBtn);
      }
      // Pause/Resume
      const pauseBtn=mkBtn(task.isPaused?'▶ Resume Task':'⏸ Pause Task','btn-sm btn-ghost',async()=>{
        if(session?.id==='demo'){toast('Demo mode.','error');return;}
        try{
          const np=!task.isPaused;
          await _supa.from('homework_tasks').update({is_paused:np}).eq('id',task.id);
          const all=DB.homeworkTasks||[];const i=all.findIndex(t=>t.id===task.id);
          if(i>-1){all[i].isPaused=np;DB.homeworkTasks=all;}
          toast(np?'Task paused.':'Task resumed.');re();
        }catch(e){console.error('pause:',e);toast('Could not update task.','error');}
      });
      detail.appendChild(pauseBtn);
      const _exRem=(DB.homeworkReminders||[]).find(r=>r.taskId===task.id);
      const _remRow=el('div',{style:{padding:'10px 0',borderTop:'1px solid var(--mint-l)',marginTop:'8px'}});
      _remRow.appendChild(el('span',{style:{fontSize:'.84rem',fontWeight:600,color:'var(--navy)',display:'block',marginBottom:'8px'}},['🔔 Reminders']));
      const _taskSlots=(task.timeOfDay||'').split(',').map(s=>s.trim()).filter(Boolean);
      const _remJson=(_exRem?.time&&_exRem.time.startsWith('{'))?JSON.parse(_exRem.time):{};
      const _singleTime=(_exRem?.time&&!_exRem.time.startsWith('{'))?_exRem.time:'';
      if(_taskSlots.length>1){_taskSlots.forEach(sl=>{const _slRow=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',flexWrap:'wrap'}});_slRow.appendChild(el('span',{style:{fontSize:'.8rem',fontWeight:600,color:'var(--slate)',minWidth:'70px'}},[(sl.charAt(0).toUpperCase()+sl.slice(1))+':']));const _sInp=el('input',{type:'time',id:'rem-inp-'+task.id+'-'+sl,value:_remJson[sl]||'',style:{minHeight:'44px',fontSize:'16px',flex:1,border:'1.5px solid var(--mint-l)',borderRadius:'8px',padding:'0 10px',background:'var(--mint-ll)',color:'var(--navy)',minWidth:'110px'}});_slRow.appendChild(_sInp);_remRow.appendChild(_slRow);});}else{const _sRow=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px',flexWrap:'wrap'}});const _remInp=el('input',{type:'time',id:'rem-inp-'+task.id,value:_singleTime,style:{minHeight:'44px',fontSize:'16px',flex:1,border:'1.5px solid var(--mint-l)',borderRadius:'8px',padding:'0 10px',background:'var(--mint-ll)',color:'var(--navy)',minWidth:'120px'}});_sRow.appendChild(_remInp);_remRow.appendChild(_sRow);}
      const _remBtnRow=el('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
      const _remSaveBtn=mkBtn('Save','btn-sm btn-primary',async()=>{
        if(session?.id==='demo'){toast('Demo mode.','error');return;}
        let _saveTime;
        if(_taskSlots.length>1){const _map={};_taskSlots.forEach(sl=>{const inp=document.getElementById('rem-inp-'+task.id+'-'+sl);if(inp?.value)_map[sl]=inp.value;});if(!Object.keys(_map).length){toast('Pick at least one time.','error');return;}_saveTime=JSON.stringify(_map);}else{const _inp=document.getElementById('rem-inp-'+task.id);if(!_inp?.value){toast('Pick a time first.','error');return;}_saveTime=_inp.value;}
        try{
          const{error:_re}=await _supa.from('homework_reminders').upsert({task_id:task.id,child_id:S.activeChild,parent_id:session.id,reminder_time:_saveTime,is_enabled:true},{onConflict:'task_id,parent_id'});
          if(_re)throw _re;
          const _all=DB.homeworkReminders||[];const _ri=_all.findIndex(r=>r.taskId===task.id);
          if(_ri>-1){_all[_ri].time=_saveTime;_all[_ri].isEnabled=true;}else{_all.push({id:'local-'+Date.now(),taskId:task.id,time:_saveTime,isEnabled:true});}
          DB.homeworkReminders=_all;toast('🔔 Reminder saved!');
        }catch(e){console.error('save reminder:',e);toast('Could not save reminder.','error');}
      });
      _remBtnRow.appendChild(_remSaveBtn);
      const _calBtn=mkBtn('📅 Add to Calendar','btn-sm btn-ghost',()=>addTaskToCalendar(task.id));
      _remBtnRow.appendChild(_calBtn);
      _remRow.appendChild(_remBtnRow);
      detail.appendChild(_remRow);
      card.appendChild(detail);
    }
    sec.appendChild(card);
  });
  return sec;
}

/* -----------------------------------------------
   HOMEWORK — SPECIALIST VIEW
----------------------------------------------- */
function renderHomeworkSpec(){
  // Guard: if task view is for a different child, clear it
  if(S._hwTaskView){
    const _t=(DB.homeworkTasks||[]).find(t=>t.id===S._hwTaskView);
    if(!_t||_t.childId!==S.activeChild)S._hwTaskView=null;
  }
  if(S._hwTaskView)return _renderHwTaskDashboard(S._hwTaskView);
  const child=DB.children.find(c=>c.id===S.activeChild);
  const allTasks=(DB.homeworkTasks||[]).filter(t=>t.childId===S.activeChild);
  const allOccs=DB.homeworkOccurrences||[];
  const sec=el('div',{class:'section'});
  const _hwBar=mkSpecBackBar(child?.name);if(_hwBar)sec.appendChild(_hwBar);
  const hd=el('div',{class:'sec-hd'});
  hd.appendChild(el('div',{class:'sec-hd-left'},[
    el('h2',{class:'page-title'},['Homework & Tasks']),
    el('p',{class:'page-sub'},[(child?.avatar||'')+' '+(child?.name||'')+"'s tasks"])
  ]));
  hd.appendChild(el('div',{class:'sec-hd-right'},[mkBtn('➕ Add Task','btn-md btn-primary',()=>showAddHomeworkTaskModal(null))]));
  sec.appendChild(hd);
  // Tabs
  const tab=S._hwSpecTab||'active';
  const activeTasks=allTasks.filter(t=>t.status==='active');
  const archiveTasks=allTasks.filter(t=>t.status==='archived');
  const tabBar=el('div',{style:{display:'flex',gap:'8px',marginBottom:'18px'}});
  ['active','archive'].forEach(f=>{
    const cnt=f==='active'?activeTasks.length:archiveTasks.length;
    const isAct=tab===f;
    const tbtn=el('button',{class:isAct?'btn btn-sm btn-primary':'btn btn-sm btn-ghost'},[(f==='active'?'Active':'Archive')]);
    tbtn.appendChild(el('span',{class:'patient-count-badge'},[String(cnt)]));
    tbtn.onclick=()=>{S._hwSpecTab=f;re();};
    tabBar.appendChild(tbtn);
  });
  sec.appendChild(tabBar);
  const tasks=tab==='active'?activeTasks:archiveTasks;
  if(!tasks.length){
    sec.appendChild(el('div',{class:'empty-state'},[
      el('span',{class:'empty-state-icon'},['📋']),
      el('div',{class:'empty-state-title'},[tab==='active'?'No active tasks':'No archived tasks']),
      el('div',{class:'empty-state-body'},[tab==='active'?"Click 'Add Task' to assign homework.":'Archived tasks will appear here.'])
    ]));
    return sec;
  }
  // Pinned section
  const pinned=tasks.filter(t=>t.isPinned);
  const rest=tasks.filter(t=>!t.isPinned);
  if(pinned.length){
    sec.appendChild(el('div',{style:{fontSize:'.7rem',fontWeight:800,color:'var(--slate)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},['📌 Pinned']));
    pinned.forEach(t=>sec.appendChild(_mkHwSpecCard(t,allOccs,child)));
    if(rest.length)sec.appendChild(el('div',{style:{fontSize:'.7rem',fontWeight:800,color:'var(--slate)',textTransform:'uppercase',letterSpacing:'.06em',margin:'14px 0 8px'}},['Other Tasks']));
  }
  rest.forEach(t=>sec.appendChild(_mkHwSpecCard(t,allOccs,child)));
  return sec;
}

/* -----------------------------------------------
   PATIENTS LIST (Specialist)
----------------------------------------------- */
function renderPatients(){
  const sec=el('div',{class:'section'});
  sec.appendChild(el('h2',{class:'page-title',style:{marginBottom:'6px'}},['My Patients']));
  sec.appendChild(el('p',{class:'page-sub'},['Click a patient to view their vault & files']));
  const si=el('input',{class:'inp',placeholder:'🔍 Search by name…',style:{marginBottom:'12px'}});
  sec.appendChild(si);

  // Filter bar — state lives in S so it survives re()
  const filterBar=el('div',{style:{display:'flex',gap:'8px',marginBottom:'18px'}});
  const filterBtns={};
  ['active','inactive','all'].forEach(f=>{
    const label=f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1);
    const btn=el('button',{class:f===S.patientStatusFilter?'btn btn-sm btn-primary':'btn btn-sm btn-ghost'},[label]);
    btn.onclick=()=>{
      S.patientStatusFilter=f;
      Object.keys(filterBtns).forEach(k=>{
        filterBtns[k].className=k===f?'btn btn-sm btn-primary':'btn btn-sm btn-ghost';
      });
      doFilter(si.value);
    };
    filterBtns[f]=btn;
    filterBar.appendChild(btn);
  });
  sec.appendChild(filterBar);

  const stack=el('div',{class:'stack'});
  // Merge DB.children with LS children (for invite-based specialists)
  const lsChildren=LS.get('children',[]);
  const allChildren=[...DB.children];
  lsChildren.forEach(lc=>{if(!allChildren.find(c=>c.id===lc.id))allChildren.push(lc);});
  const sorted=[...allChildren].sort((a,b)=>a.name.split(' ').pop().localeCompare(b.name.split(' ').pop()));
  // Count badges — derived from full unfiltered list so they always reflect totals
  const _aC=sorted.filter(c=>(c.status||'active')==='active').length;
  const _iC=sorted.filter(c=>c.status==='inactive').length;
  Object.entries({active:_aC,inactive:_iC,all:sorted.length}).forEach(([f,n])=>{
    const _badge=el('span',{class:'patient-count-badge'},[String(n)]);
    filterBtns[f].appendChild(_badge);
  });

  const doFilter=q=>{
    stack.innerHTML='';
    const filtered=sorted.filter(c=>{
      const matchName=c.name.toLowerCase().includes(q.toLowerCase());
      const cs=c.status||'active';
      const matchStatus=S.patientStatusFilter==='all'||(S.patientStatusFilter===cs);
      return matchName&&matchStatus;
    });
    if(!filtered.length){
      const msg=S.patientStatusFilter==='all'?'No patients found.':('No '+S.patientStatusFilter+' patients.');
      stack.appendChild(el('div',{class:'empty-inline'},[msg]));
      return;
    }
    filtered.forEach(c=>{
      const isInactive=(c.status||'active')==='inactive';
      const card=el('div',{class:'card click',style:{
        display:'flex',alignItems:'center',gap:'15px',
        border:S.activeChild===c.id?'2.5px solid var(--teal)':'2px solid var(--mint-l)',
        filter:isInactive?'grayscale(1)':'none',
        opacity:isInactive?'0.7':'1'
      }});
      card.appendChild(mkChildAvatar(c,52,'15px'));
      const info=d('',[], {flex:1});
      const nameRow=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'2px'}});
      nameRow.appendChild(el('div',{style:{fontWeight:800,color:'var(--navy)'}},[c.name]));
      if(isInactive) nameRow.appendChild(el('span',{class:'badge badge-rose'},['Inactive']));
      info.appendChild(nameRow);
      info.appendChild(el('div',{style:{fontSize:'.78rem',color:'var(--slate)',marginBottom:'6px'}},['Age '+c.age+' · DOB '+c.dob]));
      card.appendChild(info);
      // Status toggle
      const toggle=el('div',{class:'toggle'+(isInactive?'':' on'),style:{flexShrink:0}});
      toggle.onclick=e=>{
        e.stopPropagation();
        const children=DB.children;
        const idx=children.findIndex(ch=>ch.id===c.id);
        if(idx>-1){
          children[idx].status=(children[idx].status||'active')==='active'?'inactive':'active';
          DB.children=children;
        } else {
          const lsc=LS.get('children',[]);
          const li=lsc.findIndex(ch=>ch.id===c.id);
          if(li>-1){lsc[li].status=(lsc[li].status||'active')==='active'?'inactive':'active';LS.set('children',lsc);}
        }
        S.patientStatusFilter='all';
        re();
      };
      card.appendChild(toggle);
      // Consult is triggered from New Message in Chat, not here
      card.appendChild(el('span',{style:{color:'var(--slate-l)',fontSize:'1.1rem',fontWeight:800}},['›']));
      card.onclick=()=>{_pushNav();S.activeChild=c.id;S.activeTab='patient-detail';re();loadChildSpecialists(c.id).then(()=>re()).catch(()=>{});};
      stack.appendChild(card);
    });
  };
  doFilter('');
  si.oninput=e=>doFilter(e.target.value);
  sec.appendChild(stack);
  return sec;
}

  const hd=el('div',{class:'sec-hd',style:{marginBottom:'16px'}});
  hd.appendChild(el('h2',{class:'page-title',style:{margin:0}},['Notifications']));

      re();
    }));
  }
  sec.appendChild(hd);

  if(!notifs.length){sec.appendChild(p('All caught up! 🎉'));return sec;}

    const _nColor=_nc?.color||null;
    const card=el('div',{class:'card hov',style:{
      display:'flex',gap:'13px',alignItems:'flex-start',cursor:'pointer',
      background:n.read?'#fff':(_nColor?_nColor+'0d':'#e8faf5'),
      border:n.read?'1.5px solid var(--mint-l)':'1.5px solid var(--mint-l)',
      borderLeft:_nColor?`4px solid ${_nColor}`:(n.read?'1.5px solid var(--mint-l)':'2px solid #34d399'),
      transition:'background .25s,border .25s'
    }});
    card.appendChild(el('span',{style:{fontSize:'1.45rem',flexShrink:0}},[notifIcon[n.type]||'📢']));
    const ncBody=el('div',{style:{flex:'1'}});
    ncBody.appendChild(el('div',{style:{fontWeight:n.read?500:800,color:n.read?'var(--slate)':'var(--navy)',lineHeight:'1.4',marginBottom:'3px'}},[n.msg]));
    ncBody.appendChild(el('div',{style:{fontSize:'.72rem',color:'var(--slate-l)'}},[n.time]));
    card.appendChild(ncBody);
    if(!n.read){
      card.appendChild(el('div',{style:{width:'9px',height:'9px',borderRadius:'50%',background:'#10b981',flexShrink:0,marginTop:'4px'}}));
    }
    card.onclick=async()=>{
      // Mark read in memory + LS immediately
      const ns=DB.notifications,i=ns.findIndex(x=>x.id===n.id);
      if(i>-1){ns[i].read=true;DB.notifications=ns;}
      // Patch the LS copy directly so it survives the next Supabase refresh
      const lsNotifs=LS.get('notifications',[]);
      const li=lsNotifs.findIndex(x=>x.id===n.id);
      if(li>-1){lsNotifs[li].read=true;LS.set('notifications',lsNotifs);}
      // Persist to Supabase (awaited so it completes before the next refresh)
      if(session?.id!=='demo'){
        try{await _supa.from('notifications').update({read:true}).eq('id',n.id);}catch(e){}
      }
      // Deep-link navigation
      const tab=n.linkTab||n.link_tab;
      const ld=n.linkData||null;
      if(tab){
        _pushNav();
        if(n.childId)S.activeChild=n.childId;
        S.navLevel=1;
        if(tab==='chat'){
          S.calFullscreen=false;S.activeTab='chat';
          if(ld?.chatId){
            S.pendingChatId=ld.chatId;
            if(!S.chatsLoaded){
              S.chatsLoaded=true;
              loadChatsFromSupabase().then(()=>{
                if(S.pendingChatId){S.activeChatId=S.pendingChatId;S.pendingChatId=null;}
                re();
              });
            } else {S.activeChatId=ld.chatId;}
          } else {S.chatsLoaded=true;}
        } else if(tab==='calendar'){
          S.calFullscreen=true;S.activeTab='calendar';
          if(ld?.aptDate)S.calJumpDate=ld.aptDate;
        } else {
          S.calFullscreen=false;S.activeTab=tab;
          // Refresh data when deep-linking to team (so consult requests are loaded)
          if(tab==='team'&&session?.role==='parent'&&session?.id!=='demo'){
            refreshFromSupabase().then(()=>re()).catch(()=>{});
          }
        }
      }
      re();
    };
    stack.appendChild(card);
  });
  sec.appendChild(stack);
  return sec;
}

      if(session&&session.id!=='demo'){try{await SB.updateChild(child.id,{photo_url:photoData});}catch(e){}}

function showDeleteChildModal(child){

    warn.appendChild(el('div',{style:{fontWeight:800,color:'#be123c',fontSize:'1rem',marginBottom:'8px'}},['⚠️ This action cannot be undone']));
    warn.appendChild(el('p',{style:{color:'#be123c',fontSize:'.86rem',lineHeight:'1.7',fontWeight:500}},

    mb.appendChild(el('div',{class:'inp-label'},['Type the child\'s name to confirm']));
    const conf=el('input',{class:'inp',placeholder:child.name,style:{marginBottom:'14px'}});
    mb.appendChild(conf);
    const delBtn=mkBtn('🗑️ Permanently Delete Profile','btn-lg btn-danger btn-full',async()=>{
      if(conf.value.trim()!==child.name){toast('⚠️ Name does not match.','error');return;}
      // Archive all specialist notes for this child
      const archive=DB.legacyArchive;
      DB.specialists.filter(s=>s.status==='active').forEach(spec=>{
        const specNotes=DB.vaultNotes.filter(n=>n.specialistId===spec.id&&n.childId===child.id);
        if(specNotes.length){
          archive.push({specialistId:spec.id,specialistName:spec.name,childId:child.id,childName:child.name,archivedAt:new Date().toISOString().split('T')[0],notes:specNotes,reason:'Child profile deleted'});
        }
      });
      DB.legacyArchive=archive;
      if(session&&session.id!=='demo'){try{await SB.deleteChild(child.id);}catch(e){}}
      const ch=DB.children.filter(c=>c.id!==child.id);DB.children=ch;
      // Remove all data for this child
      DB.homework=DB.homework.filter(h=>h.childId!==child.id);
      DB.appointments=DB.appointments.filter(a=>a.childId!==child.id);
      DB.vaultNotes=DB.vaultNotes.filter(n=>n.childId!==child.id);
      DB.progress=(DB.progress||[]).filter(p=>p.childId!==child.id);
      DB.milestones=(DB.milestones||[]).filter(m=>m.childId!==child.id);
      // Switch to first remaining child or null
      S.activeChild=ch[0]?.id||null;
      close();re();toast('✅ '+child.name+"'s profile has been deleted.");
    });
    mb.appendChild(delBtn);
  },480);
}

/* -----------------------------------------------
   4. PUSH NOTIFICATION PERMISSION
----------------------------------------------- */
function renderPushBanner(){
  // FIX B7: use a separate 'pushDismissed' key so pushEnabled stays a clean boolean
  if(DB.pushEnabled===true||!('Notification' in window))return null;
  if(LS.get('pushDismissed',false))return null;
  if(Notification.permission==='granted'){
    // Already granted — persist state
    DB.pushEnabled=true;
    return null;
  }
  if(Notification.permission==='denied')return null;
  const banner=el('div',{class:'push-banner'});
  banner.innerHTML='<span style="font-size:1.6rem">🔔</span><div style="flex:1"><div style="font-weight:800;color:var(--navy)">Enable push notifications</div><div style="font-size:.78rem;color:var(--slate);margin-top:2px">Get instant alerts for new reports, messages and tasks</div></div>';
  banner.appendChild(mkBtn('Enable','btn-sm btn-primary',()=>{
    Notification.requestPermission().then(perm=>{
      if(perm==='granted'){
        DB.pushEnabled=true;
        new Notification('Huddledin 🤝',{body:'Push notifications enabled! You\'ll now get real-time alerts.',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">🤝</text></svg>'});
        re();
      } else {
        toast('Notifications blocked. You can change this in browser settings.','info');
      }
    });
  }));
  // FIX B7: store dismissed state separately, keep pushEnabled as boolean
  banner.appendChild(mkBtn('Not now','btn-sm btn-slate',()=>{LS.set('pushDismissed',true);re();}));
  return banner;
}

// Helper: send actual push if permission granted
function sendPush(title,body){
  if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
    try{new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">🤝</text></svg>'});}catch(e){}
  }
}

  const published=[...DB.vaultNotes.filter(n=>n.childId===S.activeChild&&n.published&&n.summary)]

  const specIds=[...new Set(published.map(n=>n.specialistId))];
  const team=getChildTeam(S.activeChild);

  // ── STEP 1: Specialist picker ──
  const selectedSpec=S._summarySpecFilter||null;

function genHouseholdToken(){
  const arr=new Uint8Array(14);crypto.getRandomValues(arr);
  const hex=Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('');
  return 'hd_household_'+hex.slice(0,8)+'_'+hex.slice(8);
}

async function showHouseholdInviteModal(fromSettings=false){
  openModal('👨‍👩‍👧 Add a Co-Parent',(mb,close)=>{
    mb.appendChild(el('p',{style:{color:'var(--slate)',marginBottom:'20px',lineHeight:'1.65',fontSize:'.9rem'}},
      ['Invite a partner, spouse, or co-guardian to share full access to your family account. They will see and manage the same children and care team.']));

    mb.appendChild(el('div',{class:'inp-label'},['Their Name']));
    const nameInput=el('input',{class:'inp',placeholder:'e.g. Sarah',style:{marginBottom:'12px'}});
    mb.appendChild(nameInput);

    mb.appendChild(el('div',{class:'inp-label'},['Their Email']));
    const emailInput=el('input',{class:'inp',type:'email',placeholder:'partner@email.com',style:{marginBottom:'12px'}});
    mb.appendChild(emailInput);

    mb.appendChild(el('div',{class:'inp-label'},['Relationship']));
    const roleSelect=el('select',{class:'inp',style:{marginBottom:'20px'}});
    ['Spouse','Partner','Guardian','Grandparent','Professional Carer','Other'].forEach(r=>{
      const opt=el('option',{value:r},[r]);
      roleSelect.appendChild(opt);
    });
    mb.appendChild(roleSelect);

    const errBox=el('div',{});
    mb.appendChild(errBox);

    const sendBtn=mkBtn('Send Invitation 📧','btn-md btn-primary',async()=>{
      const name=nameInput.value.trim();
      const email=emailInput.value.trim();
      const role=roleSelect.value;
      errBox.innerHTML='';
      if(!name){errBox.appendChild(el('div',{class:'auth-error'},['Please enter their name.']));return;}
      if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){errBox.appendChild(el('div',{class:'auth-error'},['Please enter a valid email.']));return;}

      sendBtn.disabled=true;sendBtn.textContent='Sending...';

      const token=genHouseholdToken();
      const expires=new Date();expires.setDate(expires.getDate()+7);
      const baseUrl=window.location.origin+window.location.pathname.replace(/\/$/,'');
      const inviteLink=baseUrl+'?household='+token+'&email='+encodeURIComponent(email);

      // Save to Supabase
      const {error}=await _supa.from('household_invites').insert({
        household_id:session.householdId,
        inviter_id:session.id,
        invitee_email:email,
        invitee_name:name,
        invitee_role:role,
        token,
        expires_at:expires.toISOString(),
        accepted:false
      });

      if(error){
        console.error('Household invite error:',error);
        errBox.appendChild(el('div',{class:'auth-error'},['Could not send invite. Please try again.']));
        sendBtn.disabled=false;sendBtn.textContent='Send Invitation 📧';
        return;
      }

      // Send email
      await fetch('/api/send-invite',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          to:email,
          childName:'your family account',
          inviteLink,
          fromName:session.name||'Your partner',
          specialistRole:role+' (Co-Parent Access)'
        })
      }).catch(()=>{});

      // Mark household invite as sent — don't show modal again
      LS.set('householdInviteSent',true);
      toast('📧 Invitation sent to '+email+'!','success',4000);
      close();
      re();
    });
    mb.appendChild(sendBtn);

    if(!fromSettings){
      const skipBtn=mkBtn('Skip for now','btn-md btn-ghost',()=>{
        LS.set('householdModalSkipped',true);
        close();
      });
      skipBtn.style.marginTop='8px';
      mb.appendChild(skipBtn);

      const dismissBtn=el('button',{style:{width:'100%',marginTop:'8px',background:'none',border:'none',color:'var(--slate)',fontSize:'.8rem',cursor:'pointer',padding:'8px'}},['Do not show this again']);
      dismissBtn.onclick=()=>{LS.set('householdModalDismissed',true);close();};
      mb.appendChild(dismissBtn);
    }
  });
}

async function processHouseholdInvite(token){
  if(!session||!token)return;
  let data=null;
  try{
    const res=await _supa.from('household_invites').select('*').eq('token',token).single();
    data=res.data;
  }catch(e){}
  if(!data){toast('⚠️ Invalid or expired household invite.','error',5000);return;}
  if(new Date(data.expires_at)<new Date()){toast('⚠️ This invite has expired.','error',5000);return;}
  if(data.accepted){toast('⚠️ This invite has already been used.','error',5000);return;}

  // Link this user to the household
  try{
    await _supa.from('profiles').update({
      household_id:data.household_id,
      is_primary:false
    }).eq('id',session.id);
  }catch(e){toast('⚠️ Could not link to family account. Please try again.','error',5000);return;}

  // Mark invite accepted
  try{
    await _supa.from('household_invites').update({accepted:true,accepted_by:session.id}).eq('id',data.id);
  }catch(e){console.error('household invite accept:',e);}

  // Clear pending tokens
  localStorage.removeItem('pendingHouseholdToken');
  localStorage.removeItem('pendingHouseholdEmail');

  // Reload session with new household_id
  const {data:{session:s}}=await _supa.auth.getSession();
  if(s)await _loadSessionFromSupabase(s);

  toast('🎉 You are now connected to the shared family account!','success',5000);
  LS.set('householdInviteSent',true);
  re();
}

async function renderHouseholdCard(){

    // Revoke button (primary only)

        if(!confirm('Remove access for '+(cp.display_name||cp.email)+'? They will no longer see this family account.'))return;

        await _supa.from('profiles').update({household_id:null,is_primary:true}).eq('id',cp.id);

    }

      const bw=w*0.7;
      // Bar
      const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x',x+'%');
      rect.setAttribute('y',String(height-barH));
      rect.setAttribute('width',bw+'%');
      rect.setAttribute('height',String(barH));
      rect.setAttribute('rx','3');
      rect.setAttribute('fill',color||'var(--teal)');
      svg.appendChild(rect);
      // Value label
      if(d[key]>0){
        const vt=document.createElementNS('http://www.w3.org/2000/svg','text');
        vt.setAttribute('x',(x+bw/2)+'%');
        vt.setAttribute('y',String(height-barH-4));
        vt.setAttribute('text-anchor','middle');
        vt.setAttribute('font-size','9');
        vt.setAttribute('fill','var(--navy)');
        vt.setAttribute('font-weight','700');
        vt.textContent=String(d[key]);
        svg.appendChild(vt);
      }
      // X label
      const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',(x+bw/2)+'%');
      lt.setAttribute('y',String(height+16));
      lt.setAttribute('text-anchor','middle');
      lt.setAttribute('font-size','8');
      lt.setAttribute('fill','var(--slate)');
      lt.textContent=d.label||'';
      svg.appendChild(lt);
    });
    wrap.appendChild(svg);
    return wrap;
  }

  function multiBarChart(data,keys,colors,title){
    const height=100;
    const max=Math.max(...data.flatMap(d=>keys.map(k=>d[k])),1);
    const wrap=el('div',{class:'card',style:{padding:'16px',marginBottom:'14px'}});
    wrap.appendChild(el('div',{style:{fontWeight:800,color:'var(--navy)',fontSize:'.82rem',marginBottom:'8px'}},[title]));
    // Legend
    const leg=el('div',{style:{display:'flex',gap:'12px',marginBottom:'10px',flexWrap:'wrap'}});
    keys.forEach((k,i)=>{
      const item=el('div',{style:{display:'flex',alignItems:'center',gap:'4px',fontSize:'.72rem',color:'var(--slate)',fontWeight:700}});
      const dot=el('div',{style:{width:'10px',height:'10px',borderRadius:'3px',background:colors[i],flexShrink:0}});
      item.appendChild(dot);item.appendChild(document.createTextNode(k));
      leg.appendChild(item);
    });
    wrap.appendChild(leg);
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','100%');
    svg.setAttribute('height',String(height+30));
    svg.style.overflow='visible';
    const groupW=100/data.length;
    const barW=groupW*0.7/keys.length;
    data.forEach((d,i)=>{
      keys.forEach((k,ki)=>{
        const barH=Math.max(1,Math.round((d[k]/max)*height));
        const x=i*groupW+groupW*0.15+ki*barW;
        const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x',x+'%');
        rect.setAttribute('y',String(height-barH));
        rect.setAttribute('width',(barW*0.85)+'%');
        rect.setAttribute('height',String(barH));
        rect.setAttribute('rx','2');
        rect.setAttribute('fill',colors[ki]);
        svg.appendChild(rect);
      });
      const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',(i*groupW+groupW/2)+'%');
      lt.setAttribute('y',String(height+16));
      lt.setAttribute('text-anchor','middle');
      lt.setAttribute('font-size','8');
      lt.setAttribute('fill','var(--slate)');
      lt.textContent=d.label||'';
      svg.appendChild(lt);
    });
    wrap.appendChild(svg);
    return wrap;
  }

  function donutChart(slices,title){
    const wrap=el('div',{class:'card',style:{padding:'16px',marginBottom:'14px'}});
    wrap.appendChild(el('div',{style:{fontWeight:800,color:'var(--navy)',fontSize:'.82rem',marginBottom:'12px'}},[title]));
    const total=slices.reduce((s,sl)=>s+sl.value,0)||1;
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','-1 -1 2 2');
    svg.setAttribute('width','120');svg.setAttribute('height','120');
    svg.style.transform='rotate(-90deg)';
    let cumAngle=0;
    slices.forEach(sl=>{
      const angle=(sl.value/total)*Math.PI*2;
      const x1=Math.cos(cumAngle),y1=Math.sin(cumAngle);
      const x2=Math.cos(cumAngle+angle),y2=Math.sin(cumAngle+angle);
      const large=angle>Math.PI?1:0;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M 0 0 L ${x1} ${y1} A 1 1 0 ${large} 1 ${x2} ${y2} Z`);
      path.setAttribute('fill',sl.color);
      svg.appendChild(path);
      cumAngle+=angle;
    });
    // Center hole
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx','0');circle.setAttribute('cy','0');circle.setAttribute('r','0.6');
    circle.setAttribute('fill','white');
    svg.appendChild(circle);
    const row=el('div',{style:{display:'flex',alignItems:'center',gap:'16px',flexWrap:'wrap'}});
    row.appendChild(svg);
    const leg=el('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}});
    slices.forEach(sl=>{
      const item=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'.75rem',color:'var(--navy)',fontWeight:700}});
      const dot=el('div',{style:{width:'10px',height:'10px',borderRadius:'50%',background:sl.color,flexShrink:0}});
      const pct=total>0?Math.round((sl.value/total)*100):0;
      item.appendChild(dot);
      item.appendChild(document.createTextNode(sl.label+': '+sl.value+' ('+pct+'%)'));
      leg.appendChild(item);
    });
    row.appendChild(leg);
    wrap.appendChild(row);
    return wrap;
  }

  function progressBar(label,value,total,color){
    const pct=total>0?Math.round((value/total)*100):0;
    const wrap=el('div',{style:{marginBottom:'10px'}});
    const lrow=el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.76rem',fontWeight:700,color:'var(--navy)',marginBottom:'4px'}});
    lrow.appendChild(document.createTextNode(label));
    lrow.appendChild(document.createTextNode(value+' / '+total+' ('+pct+'%)'));
    wrap.appendChild(lrow);
    const track=el('div',{style:{height:'8px',borderRadius:'99px',background:'var(--mint-ll)',overflow:'hidden'}});
    const fill=el('div',{style:{height:'100%',width:pct+'%',borderRadius:'99px',background:color||'var(--teal)',transition:'width .4s ease'}});
    track.appendChild(fill);wrap.appendChild(track);
    return wrap;
  }
