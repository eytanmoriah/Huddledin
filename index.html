<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Huddledin — Collaborative Care Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --teal:#0d9488;--teal-l:#14b8a6;--teal-d:#0f766e;
  --mint:#a7f3d0;--mint-l:#d1fae5;
  --coral:#f97316;--coral-l:#fed7aa;
  --amber:#f59e0b;--amber-l:#fef3c7;
  --navy:#1e293b;--navy-m:#334155;
  --slate:#64748b;--slate-l:#94a3b8;
  --bg:#f0fdf9;--bg2:#e6faf4;--white:#ffffff;
  --border:#d1fae5;--border2:#b2f0d8;
  --shadow:0 4px 24px rgba(13,148,136,.10);
  --shadow-lg:0 8px 40px rgba(13,148,136,.18);
  --r:16px;--r-sm:10px;--r-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);font-size:15px}
.ff{font-family:'Fraunces',serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--teal-l);border-radius:4px}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes badgePop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.fade-in{animation:fadeIn .38s ease both}
.slide-up{animation:slideUp .45s cubic-bezier(.16,1,.3,1) both}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}
#header{
  position:sticky;top:0;z-index:200;
  background:var(--white);border-bottom:1px solid var(--border);
  height:62px;display:flex;align-items:center;
  padding:0 20px;gap:16px;
  box-shadow:0 2px 12px rgba(13,148,136,.06)
}
#logo{display:flex;align-items:center;gap:8px;text-decoration:none}
#logo .icon{font-size:1.5rem}
#logo .name{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:700;color:var(--teal)}
#child-switcher{display:flex;gap:6px;margin-left:12px}
.child-btn{
  display:flex;align-items:center;gap:6px;padding:5px 10px;
  border-radius:20px;border:2px solid transparent;background:var(--bg);
  cursor:pointer;transition:all .2s;font-family:inherit;font-size:.8rem;font-weight:600
}
.child-btn.active{border-color:var(--teal);background:var(--mint-l);color:var(--teal-d)}
.child-btn .emoji{font-size:1rem}
#header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.sign-out-btn{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.8rem;
  color:var(--slate);font-weight:500;transition:all .2s
}
.sign-out-btn:hover{background:var(--bg2)}

/* Body area */
#body{display:flex;flex:1;min-height:0}
#sidenav{
  width:210px;min-width:210px;background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 10px;gap:3px;overflow-y:auto
}
.sidenav-user{padding:8px 12px 16px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidenav-user .label{font-size:.7rem;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sidenav-user .uname{font-weight:700;color:var(--navy);font-size:.88rem;margin:2px 0 5px}
.nav-btn{
  display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:12px;
  border:none;background:transparent;cursor:pointer;font-family:inherit;
  font-weight:500;font-size:.88rem;color:var(--slate);text-align:left;
  transition:all .18s;width:100%
}
.nav-btn:hover{background:var(--bg);color:var(--navy)}
.nav-btn.active{background:var(--mint-l);color:var(--teal-d);font-weight:700}
.nav-btn .ni{font-size:1.1rem}

#main{flex:1;overflow-y:auto;padding-bottom:20px}
#bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border);
  box-shadow:0 -4px 20px rgba(13,148,136,.08);z-index:150
}
.bnav-btn{
  flex:1;padding:9px 4px 11px;display:flex;flex-direction:column;align-items:center;
  gap:2px;border:none;background:none;cursor:pointer;
  color:var(--slate-l);font-family:inherit;font-size:.58rem;font-weight:600;transition:color .2s
}
.bnav-btn.active{color:var(--teal)}
.bnav-btn .bi{font-size:1.2rem}
.bnav-dot{width:4px;height:4px;border-radius:50%;background:var(--teal);margin-top:1px}

/* Sections */
.section{padding:22px;max-width:920px;margin:0 auto}
.page-title{font-family:'Fraunces',serif;font-size:1.55rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.page-sub{color:var(--slate);font-size:.84rem;margin-bottom:22px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}

/* Cards */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:18px;transition:box-shadow .2s}
.card.clickable{cursor:pointer}
.card.clickable:hover{box-shadow:var(--shadow-lg)}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px}
.grid-folders{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:7px;border-radius:11px;
  font-family:inherit;font-weight:600;cursor:pointer;border:none;
  transition:all .18s;white-space:nowrap;font-size:.86rem
}
.btn-sm{padding:7px 14px;font-size:.8rem}
.btn-md{padding:10px 20px}
.btn-lg{padding:13px 26px;font-size:.96rem}
.btn-primary{background:var(--teal);color:#fff;box-shadow:0 2px 12px rgba(13,148,136,.3)}
.btn-primary:hover{background:var(--teal-d)}
.btn-secondary{background:var(--mint-l);color:var(--teal-d)}
.btn-secondary:hover{background:var(--mint)}
.btn-ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
.btn-ghost:hover{background:var(--mint-l)}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-danger:hover{background:#fecaca}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 2px 12px rgba(249,115,22,.3)}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.55;cursor:not-allowed}

/* Badges */
.badge{border-radius:20px;padding:2px 10px;font-size:.72rem;font-weight:600;white-space:nowrap;display:inline-block}
.badge-teal{background:var(--mint-l);color:var(--teal-d)}
.badge-coral{background:var(--coral-l);color:#c2410c}
.badge-amber{background:var(--amber-l);color:#92400e}
.badge-slate{background:#f1f5f9;color:var(--slate)}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-pink{background:#fce7f3;color:#9d174d}
.badge-green{background:#dcfce7;color:#166534}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-shrink:0;font-size:1.2rem}

/* Inputs */
.inp{
  width:100%;padding:11px 15px;border-radius:11px;border:1.5px solid var(--border);
  font-family:inherit;font-size:.88rem;outline:none;background:var(--bg);
  transition:border-color .2s;color:var(--navy)
}
.inp:focus{border-color:var(--teal)}
.inp-group{display:flex;flex-direction:column;gap:11px}
textarea.inp{resize:vertical;min-height:100px;line-height:1.6}
select.inp{cursor:pointer}

/* Modal overlay */
.overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);
  z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px
}
.modal{
  background:#fff;border-radius:var(--r-lg);width:100%;max-height:90vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:slideUp .35s cubic-bezier(.16,1,.3,1) both
}
.modal-header{
  padding:20px 26px 16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1
}
.modal-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;color:var(--navy)}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--slate);line-height:1;padding:4px}
.modal-body{padding:22px 26px}

/* Spinner */
.spinner{
  width:18px;height:18px;border:2px solid var(--mint);border-top-color:var(--teal);
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0
}

/* Toggle switch */
.toggle{width:42px;height:23px;border-radius:12px;background:var(--slate-l);cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--teal)}
.toggle::after{content:'';width:17px;height:17px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{left:22px}

/* Checkbox */
.chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--slate-l);background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;border:none}
.chk.done{background:var(--teal);border-color:var(--teal)}
.chk.done::after{content:'✓';color:#fff;font-size:.7rem;font-weight:700}

/* Folder blur */
.blur-wrap{position:relative}
.blur-content{filter:blur(3px);pointer-events:none;user-select:none}
.blur-lock{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;z-index:2
}
.blur-lock-icon{font-size:1.6rem}
.blur-lock-label{font-size:.65rem;color:var(--slate);font-weight:700;margin-top:3px}

/* Notification bell */
.notif-wrap{position:relative}
.notif-btn{
  background:#fff;border:1.5px solid var(--border);border-radius:11px;
  padding:7px 11px;cursor:pointer;font-size:1rem;position:relative;
  display:flex;align-items:center
}
.notif-count{
  position:absolute;top:-6px;right:-6px;background:var(--coral);color:#fff;
  border-radius:50%;width:18px;height:18px;display:flex;align-items:center;
  justify-content:center;font-size:.62rem;font-weight:700;animation:badgePop .3s ease
}
.notif-dropdown{
  position:absolute;right:0;top:calc(100% + 8px);background:#fff;
  border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-lg);
  width:295px;z-index:500;overflow:hidden;animation:fadeIn .2s ease
}
.notif-dd-header{padding:14px 18px 11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.notif-item{padding:11px 18px;border-bottom:1px solid #f0fdf9;display:flex;gap:11px;align-items:flex-start}
.notif-item.unread{background:var(--mint-l)}
.notif-item-text{font-size:.8rem;color:var(--navy);line-height:1.4}
.notif-item-time{font-size:.7rem;color:var(--slate-l);margin-top:2px}

/* Stat cards */
.stat-card{display:flex;align-items:center;gap:15px}
.stat-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.stat-num{font-size:1.7rem;font-weight:700;color:var(--navy);line-height:1}
.stat-label{font-size:.74rem;color:var(--slate);margin-top:2px}

/* Chat bubbles */
.bubble-me{background:var(--teal);color:#fff;border-radius:16px 16px 4px 16px;padding:9px 15px;max-width:68%;font-size:.85rem;line-height:1.5}
.bubble-them{background:var(--bg);color:var(--navy);border-radius:16px 16px 16px 4px;padding:9px 15px;max-width:68%;font-size:.85rem;line-height:1.5}
.bubble-time{font-size:.65rem;opacity:.65;margin-top:3px;text-align:right}
.bubble-name{font-size:.68rem;font-weight:700;color:var(--teal);margin-bottom:3px}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-label{text-align:center;font-size:.72rem;font-weight:700;color:var(--slate);padding:8px 0}
.cal-day{min-height:40px;padding:4px;text-align:center;position:relative}
.cal-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:.82rem;font-weight:400}
.cal-num.has-event{background:var(--teal);color:#fff;font-weight:700;cursor:pointer}
.cal-dot{font-size:.52rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:3px;padding:1px 3px;margin-top:1px;color:#fff}

/* Pending ghost card */
.ghost-card{opacity:.72;border:1.5px dashed var(--slate-l) !important}

/* Vault AI block */
.ai-block{
  background:linear-gradient(135deg,var(--mint-l) 0%,#fff 100%);
  border-radius:13px;padding:18px;border:1.5px solid var(--teal-l)
}
.ai-label{font-size:.72rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}

/* File item */
.file-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:11px;background:var(--bg);border:1px solid var(--border);margin-bottom:9px}

/* Upload success */
.upload-success{background:var(--mint-l);border:1px solid var(--teal);border-radius:11px;padding:11px 18px;color:var(--teal-d);font-weight:600;margin-bottom:14px;animation:fadeIn .3s ease}

/* Separator */
.sep{border:none;border-top:1px solid var(--border);margin:14px 0}

/* Responsive */
@media(max-width:767px){
  #sidenav{display:none}
  #bottom-nav{display:flex}
  .section{padding:16px 14px;padding-bottom:80px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  #child-switcher .cname{display:none}
}
@media(min-width:768px){
  #bottom-nav{display:none}
}

/* ── LOGIN SCREEN ── */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.login-bg{background:linear-gradient(135deg,#0f766e 0%,#14b8a6 45%,#a7f3d0 100%)}
.login-orb1{position:absolute;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.08)}
.login-orb2{position:absolute;bottom:-60px;left:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
.login-card{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:36px 32px;width:100%;max-width:420px;color:#fff;position:relative;z-index:1}
.login-plain{background:#fff;border:1px solid var(--border);border-radius:24px;padding:36px 32px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:var(--shadow-lg)}

/* Selected role */
.role-card{
  display:flex;align-items:center;gap:15px;padding:16px;border-radius:14px;
  border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;margin-bottom:12px
}
.role-card:hover{border-color:var(--teal);box-shadow:var(--shadow)}
.role-card.selected{border-color:var(--teal);background:var(--mint-l)}

/* ── LANDING PAGE SPECIFIC ── */
.landing-hero{font-size:2.8rem;font-weight:700;line-height:1.1;color:#fff;margin-bottom:10px}
.landing-sub{color:rgba(255,255,255,.85);font-size:1rem;margin-bottom:36px;line-height:1.6}
.landing-btn-white{background:#fff;color:var(--teal-d);border-radius:13px;padding:13px 28px;font-family:inherit;font-size:.96rem;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:all .2s;width:100%;margin-bottom:10px}
.landing-btn-white:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.2)}
.landing-btn-ghost{background:transparent;color:rgba(255,255,255,.9);border:1.5px solid rgba(255,255,255,.45);border-radius:13px;padding:12px 28px;font-family:inherit;font-size:.96rem;font-weight:600;cursor:pointer;width:100%;transition:all .2s}
.landing-btn-ghost:hover{background:rgba(255,255,255,.1)}
.landing-tagline{color:rgba(255,255,255,.55);font-size:.75rem;margin-top:28px;text-align:center}
</style>

function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs)){
    if(k==="class")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null)continue;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return el;
}
function div(cls,children=[],style={}){return h("div",{class:cls,style},children)}
function btn(text,cls,onClick,attrs={}){const b=h("button",{class:"btn "+cls,...attrs});b.innerHTML=text;b.onclick=onClick;return b;}
function badge(text,color="teal"){return h("span",{class:`badge badge-${color}`},[text])}
function spinner(){return h("span",{class:"spinner"})}

function re(){
  const app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(render());
}

function setS(patch,doRe=true){Object.assign(state,patch);if(doRe)re();}

function makeModal(title,body,maxW=480){
  const ov=div("overlay");
  const mo=div("modal",[],(maxW!==480)?{maxWidth:maxW+"px"}:{maxWidth:"480px"});
  const mh=div("modal-header",[
    h("span",{class:"modal-title"},[title]),
    h("button",{class:"modal-close"},["✕"])
  ]);
  mh.querySelector(".modal-close").onclick=()=>ov.remove();
  const mb=div("modal-body",[body]);
  mo.appendChild(mh);mo.appendChild(mb);ov.appendChild(mo);
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  return {ov,close:()=>ov.remove()};
}
function confirm(title,msg,danger,onConfirm){
  const {ov,close}=makeModal(title,document.createDocumentFragment(),380);
  const body=div("",[ 
    h("p",{style:{color:"var(--slate)",marginBottom:"22px",lineHeight:"1.6"}},[msg]),
    div("",[
      btn("Cancel","btn-md btn-secondary",close),
      btn("Confirm","btn-md "+(danger?"btn-danger":"btn-primary"),()=>{onConfirm();close()})
    ],{display:"flex",gap:"12px",justifyContent:"flex-end"})
  ]);
  ov.querySelector(".modal-body").appendChild(body);
  document.body.appendChild(ov);
}

// Notif bell dropdown
function renderNotifBell(){
  const unread=notifications.filter(n=>!n.read).length;
  const wrap=div("notif-wrap");
  const bellBtn=h("button",{class:"notif-btn"},["🔔"]);
  if(unread>0){const cnt=div("notif-count",[String(unread)]);bellBtn.appendChild(cnt);}
  let dd=null;
  bellBtn.onclick=()=>{
    if(dd){dd.remove();dd=null;return;}
    dd=div("notif-dropdown fade-in");
    const ddh=div("notif-dd-header",[
      h("span",{style:{fontWeight:700,color:"var(--navy)"}},"Notifications"),
      btn("See all","btn-sm btn-ghost",()=>{dd.remove();dd=null;setS({activeTab:"notifications",notifOpen:false});})
    ]);
    dd.appendChild(ddh);
    notifications.slice(0,5).forEach(n=>{
      const ni=div("notif-item"+(n.read?"":" unread"),[
        h("span",{},[notifIcon[n.type]]),
        div("",[
          div("notif-item-text",[n.msg]),
          div("notif-item-time",[n.time])
        ])
      ]);
      dd.appendChild(ni);
    });
    wrap.appendChild(dd);
    setTimeout(()=>document.addEventListener("click",function outside(e){if(!wrap.contains(e.target)){dd&&dd.remove();dd=null;document.removeEventListener("click",outside);}},{once:false}),10);
  };
  wrap.appendChild(bellBtn);
  return wrap;
}

function renderFiles(){

  const canAccess=key=>isParent||perms.includes(key);

    div("",[
      h("h2",{class:"page-title"},["File Manager"]),

    ])
  ]);
  if(isParent){
    const upBtn=btn("📤 Upload to Dropbox","btn-md btn-primary",()=>triggerUpload());
    shr.appendChild(upBtn);
  }
  sec.appendChild(shr);

  // Hidden file input
  const fi=h("input",{type:"file",style:{display:"none"}});
  fi.id="file-input";
  fi.onchange=e=>{const f=e.target.files[0];if(f)showShareModal(f);};

    const wrap=div("blur-wrap");

      h("div",{style:{fontSize:"2.2rem",marginBottom:"8px",textAlign:"center"}},[folder.icon]),

      h("div",{style:{fontSize:".73rem",color:"var(--slate)",textAlign:"center",marginTop:"4px"}},[folder.files.length+" files"])
    ]);
    if(!acc){
      inner.classList.add("blur-content");
      const lock=div("blur-lock",[
        h("span",{class:"blur-lock-icon"},["🔒"]),
        h("span",{class:"blur-lock-label"},["Request Access"])
      ]);
      lock.onclick=()=>showRequestAccessModal(folder);
      wrap.appendChild(inner);wrap.appendChild(lock);
    } else {
      inner.onclick=()=>showFolderModal(folder);
      wrap.appendChild(inner);
    }
    grid.appendChild(wrap);
  });
  sec.appendChild(grid);
  return sec;
}

function triggerUpload(){document.getElementById("file-input")?.click();}

function showShareModal(file){
  const frag=document.createDocumentFragment();
  const p=h("p",{style:{color:"var(--slate)",marginBottom:"16px"}},[`Choose who can view "${file.name}":`]);
  frag.appendChild(p);
  const permsState={};
  specialists.filter(s=>s.status==="active").forEach(s=>{permsState[s.id]=true;});
  const rows=div("inp-group");
  specialists.filter(s=>s.status==="active").forEach(s=>{
    const lbl=h("label",{style:{display:"flex",alignItems:"center",gap:"11px",cursor:"pointer"}});
    const cb=h("input",{type:"checkbox",checked:"true"});
    cb.checked=true;
    lbl.appendChild(cb);
    lbl.appendChild(renderAvatar(s.avatar,32,"#d1fae5"));
    lbl.appendChild(div("",[
      div("",[s.name],{fontWeight:600,fontSize:".86rem"}),
      div("",[s.role],{fontSize:".76rem",color:"var(--slate)"})
    ]));
    rows.appendChild(lbl);
  });
  frag.appendChild(rows);
  const btns=div("",[],{display:"flex",gap:"12px",marginTop:"20px"});
  const {ov,close}=makeModal("📤 Share Settings",frag);
  const cancelB=btn("Cancel","btn-md btn-ghost",close);
  const upB=btn('<span class="spinner" style="display:none"></span> Upload & Share',"btn-md btn-primary",async()=>{
    const sp=upB.querySelector(".spinner");sp.style.display="inline-block";
    upB.disabled=true;
    try{
      const ab=await file.arrayBuffer();
      const child=children.find(c=>c.id===state.activeChild);
      const resp=await fetch("https://content.dropboxapi.com/2/files/upload",{
        method:"POST",
        headers:{
          "Authorization":"Bearer "+DROPBOX_TOKEN,
          "Content-Type":"application/octet-stream",
          "Dropbox-API-Arg":JSON.stringify({path:`/Huddledin/${child?.name||"General"}/${file.name}`,mode:"add",autorename:true})
        },body:ab
      });
      const data=await resp.json();
      close();
      showToast("✅ \""+( data.name||file.name)+"\" uploaded to Dropbox!");
    }catch(e){close();showToast("❌ Upload failed: "+e.message,true);}
  });
  btns.appendChild(cancelB);btns.appendChild(upB);
  ov.querySelector(".modal-body").appendChild(btns);
  document.body.appendChild(ov);
}

function showFolderModal(folder){
  const frag=document.createDocumentFragment();

      f.locked?badge("🔒 Locked","amber"):h("span",{},[])

    const ub=btn("📤 Upload File Here","btn-md btn-primary btn-full",()=>{ov.remove();triggerUpload();});
    ub.style.marginTop="10px";
    frag.appendChild(ub);
  }
  const {ov}=makeModal(folder.icon+" "+folder.name,frag);
  document.body.appendChild(ov);
}

function showRequestAccessModal(folder){
  const frag=document.createDocumentFragment();
  frag.appendChild(h("p",{style:{color:"var(--slate)",marginBottom:"20px",lineHeight:"1.6"}},
    [`You don't have access to the ${folder.name} folder. Send an access request to the Carter family?`]));

  frag.appendChild(btn("Send Request","btn-md btn-primary btn-full",()=>{

  ov.querySelector(".modal-body").appendChild(btn("Send Request","btn-md btn-primary btn-full",()=>{close();showToast("✅ Access request sent to parent!");}));
  document.body.appendChild(ov);
}

function showToast(msg,err=false){
  const t=div("",[msg],{
    position:"fixed",bottom:"90px",left:"50%",transform:"translateX(-50%)",
    background:err?"#fca5a5":typeof msg==="string"&&msg.startsWith("✅")?"var(--mint-l)":"var(--mint-l)",
    border:"1px solid "+(err?"#f87171":"var(--teal)"),
    color:err?"#991b1b":"var(--teal-d)",
    borderRadius:"12px",padding:"12px 22px",fontWeight:600,
    zIndex:9999,whiteSpace:"nowrap",boxShadow:"var(--shadow-lg)",animation:"fadeIn .3s ease"
  });
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

        ].filter(Boolean),{flex:1}),
        div("",[
          div("",[apt.date],{fontWeight:700,color:"var(--teal)",fontSize:".86rem",textAlign:"right"}),

    const inputRow=div("",[],{padding:"13px 16px",borderTop:"1px solid var(--border)",display:"flex",gap:"9px"});

      const newMsg={id:"m_"+Date.now(),sender:state.role==="parent"?"parent":state.specialistId,text:txt,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),date:new Date().toISOString().split("T")[0]};

  const child=children.find(c=>c.id===state.activeChild);

  sec.appendChild(shr);

  myNotes.forEach(note=>{
    const nc=div("card clickable",[],{border:state.activeVaultNoteId===note.id?"2px solid var(--teal)":"1px solid var(--border)"});
    const nh=div("",[],{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"5px"});
    nh.appendChild(h("span",{style:{fontWeight:700,fontSize:".86rem",color:"var(--navy)",lineHeight:"1.3"}},[note.title]));
    const flags=div("",[]);
    if(note.locked)flags.appendChild(h("span",{},"🔒"));
    if(note.published)flags.appendChild(badge("Published","teal"));
    nh.appendChild(flags);
    nc.appendChild(nh);
    nc.appendChild(div("",[note.date],{fontSize:".74rem",color:"var(--slate)"}));
    nc.appendChild(div("",[note.content.slice(0,55)+"..."],{fontSize:".76rem",color:"var(--slate-l)",marginTop:"5px"}));
    nc.onclick=()=>setS({activeVaultNoteId:note.id,vaultSummaryText:note.summary||""});
    noteList.appendChild(nc);
  });
  layout.appendChild(noteList);

  // Note editor
  if(activeNote){
    const editor=div("card",[],{display:"flex",flexDirection:"column",gap:"14px"});

    // Title row
    const titleRow=div("",[],{display:"flex",justifyContent:"space-between",alignItems:"center"});
    const titleI=h("input",{style:{fontFamily:"'Fraunces',serif",fontSize:"1.05rem",fontWeight:700,border:"none",outline:"none",flex:"1",background:"transparent",color:"var(--navy)"}});
    titleI.value=activeNote.title;
    titleI.disabled=activeNote.locked;
    titleI.oninput=e=>{activeNote.title=e.target.value;};
    titleRow.appendChild(titleI);
    const closeB=h("button",{style:{background:"none",border:"none",cursor:"pointer",color:"var(--slate)",fontSize:"1.1rem"}},["✕"]);
    closeB.onclick=()=>setS({activeVaultNoteId:null,vaultSummaryText:""});
    titleRow.appendChild(closeB);
    editor.appendChild(titleRow);

    // Clinical notes
    const clinLabel=div("",[],{fontSize:".7rem",fontWeight:700,color:"var(--slate)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"6px"});
    clinLabel.textContent="Clinical Notes (Private)";
    editor.appendChild(clinLabel);
    const ta=h("textarea",{class:"inp",style:{minHeight:"150px"}});
    ta.value=activeNote.content;
    ta.disabled=activeNote.locked;
    ta.oninput=e=>{activeNote.content=e.target.value;};
    editor.appendChild(ta);

    // Actions
    const actRow=div("",[],{display:"flex",gap:"9px",flexWrap:"wrap"});
    if(!activeNote.locked){
      const aiB=btn("✨ AI Summarize","btn-md btn-secondary",async()=>{
        aiB.disabled=true;aiB.innerHTML='<span class="spinner"></span> Summarizing...';
        try{
          const resp=await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Convert these clinical session notes into a warm, encouraging, parent-friendly summary. Avoid jargon. Be positive but honest. Keep to 3-4 sentences.\n\nClinical notes:\n${activeNote.content}`}]})
          });
          const data=await resp.json();
          const text=data.content?.[0]?.text||"Unable to generate summary.";
          activeNote.summary=text;
          setS({activeVaultNoteId:activeNote.id,vaultSummaryText:text});
        }catch(e){
          setS({activeVaultNoteId:activeNote.id,vaultSummaryText:"AI failed. Please write a summary manually."});
        }
      });
      actRow.appendChild(aiB);
      actRow.appendChild(btn("🔒 Lock","btn-sm btn-ghost",()=>confirm("Lock Report?","Locking makes this a permanent, uneditable record. This cannot be undone.",true,()=>{activeNote.locked=true;re();})));
    }
    editor.appendChild(actRow);

    // Summary block
    const summaryText=state.vaultSummaryText||activeNote.summary||"";
    if(summaryText){
      const ab=div("ai-block");
      ab.appendChild(div("ai-label",["✨ Parent-Friendly Summary"]));
      const sta=h("textarea",{class:"inp",style:{minHeight:"90px",background:"white"}});
      sta.value=summaryText;
      sta.oninput=e=>{activeNote.summary=e.target.value;state.vaultSummaryText=e.target.value;};
      ab.appendChild(sta);
      const pubB=btn("📤 Lock & Publish to Parent","btn-md btn-primary",()=>{
        confirm("Publish Summary?","This will send the summary to the parent's profile.",false,()=>{
          activeNote.published=true;
          notifications.unshift({id:"n_"+Date.now(),type:"report",msg:`Dr. Sarah Okafor published a new summary for ${child?.name}`,time:"Just now",read:false,childId:state.activeChild});
          re();showToast("🎉 Summary published to parent's profile!");
        });
      });
      pubB.style.marginTop="11px";
      ab.appendChild(pubB);
      editor.appendChild(ab);
    }

    layout.appendChild(editor);
  }

  sec.appendChild(layout);

  // Mobile stack
  if(window.innerWidth<768)layout.style.gridTemplateColumns="1fr";

  return sec;
}

  nc.appendChild(h("h3",{style:{fontWeight:700,color:"var(--navy)",marginBottom:"16px"}},["🔔 Notification Preferences"]));
  Object.entries(settings_notifs).forEach(([key,val])=>{
    const row=div("",[],{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--border)"});
    const label=h("span",{style:{textTransform:"capitalize",color:"var(--navy)"}},[key+" notifications"]);
    const tog=h("button",{class:"toggle"+(val?" on":"")});
    tog.onclick=()=>{settings_notifs[key]=!settings_notifs[key];tog.className="toggle"+(settings_notifs[key]?" on":"");};
    row.appendChild(label);row.appendChild(tog);
    nc.appendChild(row);
  });
  sec.appendChild(nc);

  // Privacy card
  const pc=div("card");
  pc.appendChild(h("h3",{style:{fontWeight:700,color:"var(--navy)",marginBottom:"12px"}},["🔒 Privacy & Security"]));
  pc.appendChild(h("p",{style:{color:"var(--slate)",fontSize:".86rem",lineHeight:"1.65"}},
    ["All data is encrypted end-to-end. Specialists only see files you explicitly share. Files are stored securely in your Dropbox account. Specialists retain a Legacy Archive of their own authored notes if removed from the care team."]));
  sec.appendChild(pc);
  return sec;
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────
function renderLogin(){
  const scr=div("login-bg",[], {minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",position:"relative",overflow:"hidden"});
  scr.appendChild(div("login-orb1"));
  scr.appendChild(div("login-orb2"));

  if(state.loginStep==="landing"){
    const card=div("login-card slide-up");
    card.innerHTML=`<div style="text-align:center;margin-bottom:28px"><div style="font-size:3.5rem;margin-bottom:12px">🤝</div><h1 class="ff" style="font-size:2.6rem;font-weight:700;margin-bottom:9px">Huddledin</h1><p style="color:rgba(255,255,255,.85);font-size:.98rem;line-height:1.65">Collaborative care for children with special needs — all in one place.</p></div>`;
    const gb=h("button",{class:"landing-btn-white"},["Get Started"]);
    gb.onclick=()=>setS({loginStep:"role"});
    const sb=h("button",{class:"landing-btn-ghost"},["Sign In"]);
    sb.onclick=()=>setS({loginStep:"role"});
    card.appendChild(gb);card.appendChild(sb);
    card.appendChild(h("p",{class:"landing-tagline"},["Secure • HIPAA-aware • Parent-first"]));
    scr.appendChild(card);
  }
  else if(state.loginStep==="role"){
    const card=div("login-plain slide-up");
    const back=h("button",{style:{background:"none",border:"none",cursor:"pointer",color:"var(--slate)",marginBottom:"18px",fontSize:".88rem",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"5px"}},"← Back");
    back.onclick=()=>setS({loginStep:"landing"});
    card.appendChild(back);
    card.innerHTML+=`<h2 class="ff" style="font-size:1.65rem;font-weight:700;margin-bottom:6px;color:var(--navy)">Who are you?</h2><p style="color:var(--slate);margin-bottom:24px">Choose your role to continue.</p>`;
    card.querySelector("button").onclick=()=>setS({loginStep:"landing"});
    [{r:"parent",emoji:"👨‍👩‍👧",label:"Parent / Guardian",desc:"Manage your child's care team, files, and appointments"},{r:"specialist",emoji:"🩺",label:"Specialist / Therapist",desc:"View patient notes, publish summaries, assign homework"}].forEach(({r,emoji,label,desc})=>{
      const rc=div("role-card"+(state.role===r?" selected":""));
      rc.innerHTML=`<span style="font-size:2.2rem">${emoji}</span><div><div style="font-weight:700;color:var(--navy);margin-bottom:3px">${label}</div><div style="font-size:.8rem;color:var(--slate)">${desc}</div></div>`;
      rc.onclick=()=>setS({role:r,loginStep:"form"});
      card.appendChild(rc);
    });
    scr.appendChild(card);
  }
  else{
    const card=div("login-plain slide-up");
    const back=h("button",{style:{background:"none",border:"none",cursor:"pointer",color:"var(--slate)",marginBottom:"18px",fontSize:".88rem",fontFamily:"inherit"}},["← Back"]);
    back.onclick=()=>setS({loginStep:"role"});
    card.appendChild(back);
    card.appendChild(h("div",{style:{textAlign:"center",marginBottom:"26px"}},[ h("div",{style:{fontSize:"2.8rem",marginBottom:"9px"}},[state.role==="parent"?"👨‍👩‍👧":"🩺"]), h("h2",{class:"ff",style:{fontSize:"1.65rem",fontWeight:700,color:"var(--navy)"}},[state.role==="parent"?"Parent Sign In":"Specialist Sign In"]) ]));
    const form=div("inp-group");
    if(state.role==="parent")form.appendChild(h("input",{class:"inp",placeholder:"Full Name"}));
    form.appendChild(h("input",{class:"inp",placeholder:"Email address",type:"email"}));
    form.appendChild(h("input",{class:"inp",placeholder:"Password",type:"password"}));
    const signinB=h("button",{class:"btn btn-primary btn-lg btn-full",style:{marginTop:"8px"}},["Sign In"]);
    let loading=false;
    signinB.onclick=()=>{
      if(loading)return;loading=true;
      signinB.innerHTML='<span class="spinner"></span> Signing in...';
      setTimeout(()=>{
        const firstTab=state.role==="parent"?"dashboard":"patients";
        setS({screen:"app",activeTab:firstTab,specialistId:"s1"});
      },1100);
    };
    form.appendChild(signinB);
    card.appendChild(form);
    card.appendChild(h("p",{style:{textAlign:"center",color:"var(--slate)",fontSize:".8rem",marginTop:"16px"}},["Demo: any credentials work ✨"]));
    scr.appendChild(card);
  }
  return scr;
}

// ── MAIN APP SHELL ────────────────────────────────────────────────────────
function renderApp(){
  const wrap=div("fade-in",[],{display:"flex",flexDirection:"column",minHeight:"100vh"});
  wrap.appendChild(renderHeader());
  const body=h("div",{id:"body"});
  body.appendChild(renderSideNav());
  const main=h("main",{id:"main"});
  main.appendChild(renderContent());
  body.appendChild(main);
  wrap.appendChild(body);
  wrap.appendChild(renderBottomNav());
  return wrap;
}

function renderContent(){
  const t=state.activeTab;
  if(state.role==="parent"){
    if(t==="dashboard")return renderDashboard();
    if(t==="files")return renderFiles();
    if(t==="team")return renderTeam();
    if(t==="calendar")return renderCalendar();
    if(t==="chat")return renderChat();
    if(t==="notifications")return renderNotifications();
    if(t==="settings")return renderSettings();
  } else {
    if(t==="patients")return renderPatients();
    if(t==="vault")return renderVault();
    if(t==="homework")return renderHomeworkSpec();
    if(t==="files")return renderFiles();
    if(t==="chat")return renderChat();
    if(t==="notifications")return renderNotifications();
  }
  return div("",[h("p",{style:{padding:"30px",color:"var(--slate)"}},"Coming soon...")]);
}

// ── ROOT RENDER ───────────────────────────────────────────────────────────
function render(){
  if(state.screen==="login")return renderLogin();
  return renderApp();
}

// Boot
re();
</script>
</body>
</html>
